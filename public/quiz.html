<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 대시보드</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: slideIn 0.8s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .exam-info {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .exam-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .exam-meta {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .meta-item {
            text-align: center;
        }
        
        .meta-value {
            font-size: 2rem;
            font-weight: bold;
            display: block;
        }
        
        .meta-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid #3498db;
        }
        
        .stat-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #ecf0f1;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #3498db, #2980b9);
            border-radius: 5px;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .action-btn {
            padding: 25px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .action-btn:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f39c12, #e67e22);
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .recent-activity {
            background: white;
            border: 2px solid #ecf0f1;
            border-radius: 15px;
            padding: 25px;
        }
        
        .activity-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: bold;
            color: white;
        }
        
        .icon-correct {
            background: #2ecc71;
        }
        
        .icon-incorrect {
            background: #e74c3c;
        }
        
        .activity-content {
            flex: 1;
        }
        
        .activity-title {
            font-weight: bold;
            color: #2c3e50;
        }
        
        .activity-time {
            font-size: 0.8rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div class="exam-info">
                <div class="exam-title" id="examTitle">건설안전기사 2003년 1회</div>
                <div class="exam-meta">
                    <div class="meta-item">
                        <span class="meta-value" id="ddayValue">D-15</span>
                        <span class="meta-label">시험까지</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-value" id="totalQuestions">120</span>
                        <span class="meta-label">총 문제수</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-value" id="completedQuestions">45</span>
                        <span class="meta-label">완료한 문제</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-value" id="accuracyRate">78%</span>
                        <span class="meta-label">정답률</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">전체 진행률</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 37%"></div>
                </div>
                <div class="progress-text">45/120 문제 (37%)</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-title">오늘의 학습</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 60%"></div>
                </div>
                <div class="progress-text">12/20 문제 목표</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-title">약점 과목</div>
                <div style="color: #e74c3c; font-weight: bold;">기계안전관리</div>
                <div class="progress-text">정답률 65% - 복습 필요</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-title">연속 학습</div>
                <div style="color: #2ecc71; font-weight: bold; font-size: 1.5rem;">7일</div>
                <div class="progress-text">꾸준한 학습 중!</div>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn btn-primary" onclick="startFullQuiz()">
                📚 전체 문제 풀이<br>
                <small>남은 문제부터 계속</small>
            </button>
            
            <button class="action-btn btn-secondary" onclick="startWrongQuiz()">
                📝 오답노트 복습<br>
                <small>틀린 문제 23개</small>
            </button>
            
            <button class="action-btn btn-success" onclick="startRandomQuiz()">
                🎲 랜덤 20문제<br>
                <small>빠른 실력 점검</small>
            </button>
            
            <button class="action-btn btn-warning" onclick="startTimerQuiz()">
                ⏰ 타이머 모드<br>
                <small>실전 시험 환경</small>
            </button>
        </div>
        
        <div class="recent-activity">
            <h3 style="color: #2c3e50; margin-bottom: 20px;">최근 학습 활동</h3>
            
            <div class="activity-item">
                <div class="activity-icon icon-correct">✓</div>
                <div class="activity-content">
                    <div class="activity-title">안전관리론 15문제 완료</div>
                    <div class="activity-time">2시간 전 • 정답률 80%</div>
                </div>
            </div>
            
            <div class="activity-item">
                <div class="activity-icon icon-incorrect">✗</div>
                <div class="activity-content">
                    <div class="activity-title">기계안전관리 8문제 오답</div>
                    <div class="activity-time">어제 • 복습 추천</div>
                </div>
            </div>
            
            <div class="activity-item">
                <div class="activity-icon icon-correct">✓</div>
                <div class="activity-content">
                    <div class="activity-title">전기안전관리 완주</div>
                    <div class="activity-time">2일 전 • 정답률 95%</div>
                </div>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <button onclick="goBackToSetup()" style="padding: 15px 30px; border: none; background: #95a5a6; color: white; border-radius: 10px; cursor: pointer; margin-right: 15px;">
                ← 이전 단계 (시험 선택)
            </button>
            <button onclick="goToSettings()" style="padding: 15px 30px; border: none; background: #34495e; color: white; border-radius: 10px; cursor: pointer;">
                설정 변경
            </button>
        </div>
    </div>

    <script>
        // 전역 변수 선언
        let config = {};
        
        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Dashboard page loaded');
            loadDashboard();
        });
        
        // 설정 로드 및 초기화
        function loadDashboard() {
            try {
                config = JSON.parse(localStorage.getItem('quizConfig') || '{}');
                console.log('Dashboard loaded with config:', config);
                
                // 제목 설정
                if (config.session) {
                    const examTitle = getExamDisplayName(config);
                    document.getElementById('examTitle').textContent = examTitle;
                } else {
                    console.warn('No session in config');
                    // 설정이 없어도 기본 화면은 보여줌
                }
                
                // D-Day 계산
                if (config.examDate) {
                    const examDate = new Date(config.examDate);
                    const today = new Date();
                    const daysDiff = Math.ceil((examDate - today) / (1000 * 60 * 60 * 24));
                    document.getElementById('ddayValue').textContent = daysDiff > 0 ? `D-${daysDiff}` : 'D-DAY';
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        // 시험 표시명 생성
        function getExamDisplayName(config) {
            const examNames = {
                'construction-safety': '건설안전기사',
                'industrial-safety': '산업안전기사',
                'fire-safety': '소방안전기사'
            };
            
            const sessionNames = {
                'construction-safety-2003-1': '2003년 1회',
                'construction-safety-2003-2': '2003년 2회',
                'construction-safety-2003-4': '2003년 4회'
            };
            
            return `${examNames[config.examType] || '시험'} ${sessionNames[config.session] || config.session}`;
        }
        
        // 전체 문제 풀이 시작
        function startFullQuiz() {
            console.log('Starting full quiz');
            localStorage.setItem('quizMode', 'full');
            startQuiz();
        }
        
        // 오답노트 복습 시작
        function startWrongQuiz() {
            console.log('Starting wrong quiz');
            localStorage.setItem('quizMode', 'wrong');
            startQuiz();
        }
        
        // 랜덤 문제 시작
        function startRandomQuiz() {
            console.log('Starting random quiz');
            localStorage.setItem('quizMode', 'random');
            startQuiz();
        }
        
        // 타이머 모드 시작
        function startTimerQuiz() {
            console.log('Starting timer quiz');
            localStorage.setItem('quizMode', 'timer');
            startQuiz();
        }
        
        // 퀴즈 시작 (페이지 전환)
        function startQuiz() {
            // 설정 검증
            const currentConfig = JSON.parse(localStorage.getItem('quizConfig') || '{}');
            if (!currentConfig.session) {
                alert('시험 회차가 설정되지 않았습니다. 처음부터 다시 설정해주세요.');
                window.location.href = 'index.html';
                return;
            }
            
            console.log('Starting quiz with config:', currentConfig);
            
            // 페이지 전환 애니메이션
            const container = document.querySelector('.dashboard-container');
            container.style.transform = 'scale(0.9)';
            container.style.opacity = '0';
            container.style.transition = 'all 0.3s ease';
            
            setTimeout(() => {
                window.location.href = 'solve.html';
            }, 300);
        }
        
        // 이전 단계로 돌아가기
        function goBackToSetup() {
            console.log('Going back to setup');
            window.location.href = 'index.html';
        }
        
        // 설정 초기화
        function goToSettings() {
            console.log('Resetting settings');
            localStorage.removeItem('quizConfig');
            localStorage.removeItem('quizMode');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
