<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 대시보드</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: slideIn 0.8s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .exam-info {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .exam-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .exam-meta {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .meta-item {
            text-align: center;
        }
        
        .meta-value {
            font-size: 2rem;
            font-weight: bold;
            display: block;
        }
        
        .meta-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid #3498db;
        }
        
        .stat-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #ecf0f1;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #3498db, #2980b9);
            border-radius: 5px;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .action-btn {
            padding: 25px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .action-btn:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f39c12, #e67e22);
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .recent-activity {
            background: white;
            border: 2px solid #ecf0f1;
            border-radius: 15px;
            padding: 25px;
        }
        
        .activity-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: bold;
            color: white;
        }
        
        .icon-correct {
            background: #2ecc71;
        }
        
        .icon-incorrect {
            background: #e74c3c;
        }
        
        .activity-content {
            flex: 1;
        }
        
        .activity-title {
            font-weight: bold;
            color: #2c3e50;
        }
        
        .activity-time {
            font-size: 0.8rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div class="exam-info">
                <div class="exam-title" id="examTitle">건설안전기사 2003년 1회</div>
                <div class="exam-meta">
                    <div class="meta-item">
                        <span class="meta-value" id="ddayValue">D-15</span>
                        <span class="meta-label">시험까지</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-value" id="totalQuestions">120</span>
                        <span class="meta-label">총 문제수</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-value" id="completedQuestions">45</span>
                        <span class="meta-label">완료한 문제</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-value" id="accuracyRate">78%</span>
                        <span class="meta-label">정답률</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">전체 진행률</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 37%"></div>
                </div>
                <div class="progress-text">45/120 문제 (37%)</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-title">오늘의 학습</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 60%"></div>
                </div>
                <div class="progress-text">12/20 문제 목표</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-title">약점 과목</div>
                <div style="color: #e74c3c; font-weight: bold;">기계안전관리</div>
                <div class="progress-text">정답률 65% - 복습 필요</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-title">연속 학습</div>
                <div style="color: #2ecc71; font-weight: bold; font-size: 1.5rem;">7일</div>
                <div class="progress-text">꾸준한 학습 중!</div>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn btn-primary" onclick="startFullQuiz()">
                📚 전체 문제 풀이<br>
                <small>남은 문제부터 계속</small>
            </button>
            
            <button class="action-btn btn-secondary" onclick="startWrongQuiz()">
                📝 오답노트 복습<br>
                <small>틀린 문제 23개</small>
            </button>
            
            <button class="action-btn btn-success" onclick="startRandomQuiz()">
                🎲 랜덤 20문제<br>
                <small>빠른 실력 점검</small>
