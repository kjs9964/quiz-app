<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제 풀이</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .exam-info {
            font-weight: bold;
            color: #2c3e50;
        }
        
        .progress-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .progress-circle {
            position: relative;
            width: 60px;
            height: 60px;
        }
        
        .circle-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#3498db var(--progress), #ecf0f1 0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e74c3c;
        }
        
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #3498db, #2ecc71);
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .question-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3498db;
        }
        
        .question-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn-bookmark {
            background: #f39c12;
            color: white;
        }
        
        .btn-skip {
            background: #95a5a6;
            color: white;
        }
        
        .btn-bookmark:hover {
            background: #e67e22;
            transform: scale(1.05);
        }
        
        .btn-skip:hover {
            background: #7f8c8d;
            transform: scale(1.05);
        }
        
        .question-text {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 500;
        }
        
        .options {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .option {
            padding: 20px;
            border: 3px solid #ecf0f1;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
        }
        
        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(52, 152, 219, 0.1), transparent);
            transition: left 0.5s;
        }
        
        .option:hover::before {
            left: 100%;
        }
        
        .option:hover {
            border-color: #3498db;
            background: #f8f9fa;
            transform: translateX(5px);
        }
        
        .option-label {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 20px;
            font-size: 1.3rem;
        }
        
        .option.selected {
            border-color: #2ecc71;
            background: #d5f4e6;
        }
        
        .option.correct {
            border-color: #27ae60;
            background: #d5f4e6;
            animation: correctPulse 0.6s ease;
        }
        
        .option.incorrect {
            border-color: #e74c3c;
            background: #fadbd8;
            animation: incorrectShake 0.6s ease;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        @keyframes incorrectShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .feedback {
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            display: none;
            animation: slideDown 0.5s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .feedback.correct {
            background: #d5f4e6;
            border: 3px solid #27ae60;
            color: #155724;
        }
        
        .feedback.incorrect {
            background: #fadbd8;
            border: 3px solid #e74c3c;
            color: #721c24;
        }
        
        .feedback-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .explanation {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #3498db;
        }
        
        .navigation {
            background: white;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .nav-btn:hover::before {
            left: 100%;
        }
        
        .btn-prev {
            background: #95a5a6;
            color: white;
        }
        
        .btn-next {
            background: #3498db;
            color: white;
        }
        
        .btn-prev:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }
        
        .btn-next:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        
        .btn-prev:disabled,
        .btn-next:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }
        
        .question-counter {
            font-weight: bold;
            color: #2c3e50;
            font-size: 1.1rem;
        }
        
        .skip-indicator {
            background: #f39c12;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .floating-menu {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        
        .floating-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        
        .btn-home {
            background: #e74c3c;
            color: white;
        }
        
        .btn-dashboard {
            background: #2ecc71;
            color: white;
        }
        
        .floating-btn:hover {
            transform: scale(1.1);
        }
        
        @media (max-width: 768px) {
            .quiz-container {
                padding: 10px;
            }
            
            .question-card {
                padding: 25px;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
            }
            
            .progress-info {
                justify-content: center;
            }
            
            .floating-menu {
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="header">
            <div class="exam-info" id="examInfo">건설안전기사 2003년 1회</div>
            <div class="progress-info">
                <div class="progress-circle">
                    <div class="circle-bg" style="--progress: 25%;">25%</div>
                </div>
                <div>
                    <div class="question-counter" id="questionCounter">1 / 120</div>
                    <div style="color: #7f8c8d; font-size: 0.9rem;">정답률: <span id="accuracyRate">0%</span></div>
                </div>
                <div class="timer" id="timer">15:30</div>
            </div>
        </div>
        
        <div class="question-card">
            <div class="question-header">
                <div class="question-number" id="questionNumber">문제 1</div>
                <div class="question-actions">
                    <button class="action-btn btn-bookmark" onclick="toggleBookmark()">⭐ 북마크</button>
                    <button class="action-btn btn-skip" onclick="skipQuestion()">⏭️ 건너뛰기</button>
                </div>
            </div>
            
            <div class="question-text" id="questionText">
                자체검사 방법의 분류에 속하지 않는 것은?
            </div>
            
            <div class="options" id="optionsContainer">
                <div class="option" onclick="selectAnswer(this, 'A', 1)">
                    <div class="option-label">A</div>
                    <div>형식에 의한 검사</div>
                </div>
                <div class="option" onclick="selectAnswer(this, 'B', 2)">
                    <div class="option-label">B</div>
                    <div>타진에 의한 검사</div>
                </div>
                <div class="option" onclick="selectAnswer(this, 'C', 3)">
                    <div class="option-label">C</div>
                    <div>검사기기에 의한 검사</div>
                </div>
                <div class="option" onclick="selectAnswer(this, 'D', 4)">
                    <div class="option-label">D</div>
                    <div>육안에 의한 검사</div>
                </div>
            </div>
            
            <div class="feedback" id="feedback">
                <div class="feedback-title">🎉 정답입니다!</div>
                <div>잘하셨습니다. 다음 문제로 넘어가세요.</div>
                <div class="explanation" id="explanationBox" style="display: none;">
                    <strong>해설:</strong> 형식에 의한 검사는 자체검사 방법이 아닙니다...
                </div>
            </div>
        </div>
        
        <div class="navigation">
            <button class="nav-btn btn-prev" onclick="previousQuestion()" id="prevBtn">◀ 이전</button>
            <div class="question-counter">
                문제 <span id="currentNum">1</span> / <span id="totalNum">120</span>
                <span class="skip-indicator" id="skipIndicator" style="display: none;">건너뜀</span>
            </div>
            <button class="nav-btn btn-next" onclick="nextQuestion()" id="nextBtn">다음 ▶</button>
        </div>
    </div>
    
    <div class="floating-menu">
        <button class="floating-btn btn-dashboard" onclick="goToDashboard()" title="대시보드">📊</button>
        <button class="floating-btn btn-home" onclick="goHome()" title="홈으로">🏠</button>
        <button class="floating-btn" onclick="goBack()" title="이전 단계" style="background: #f39c12; color: white;">←</button>
    </div>

    <script>
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let selectedAnswer = null;
        let isAnswered = false;
        let skippedQuestions = new Set();
        let bookmarkedQuestions = new Set();
        let answeredQuestions = 0;
        let correctAnswers = 0;
        let totalQuestions = 0;
        let startTime = Date.now();
        let timerInterval;

        // 설정 로드
        const config = JSON.parse(localStorage.getItem('quizConfig') || '{}');
        const mode = localStorage.getItem('quizMode') || 'full';

        document.addEventListener('DOMContentLoaded', function() {
            loadQuestions();
            startTimer();
            setupKeyboardNavigation();
        });

        async function loadQuestions() {
            try {
                const response = await fetch(`/api/exams/${config.session}`);
                const data = await response.json();
                
                if (data.error) {
                    alert(data.error);
                    return;
                }
                
                currentQuestions = data.questions;
                totalQuestions = currentQuestions.length;
                
                // 모드별 문제 필터링
                if (mode === 'random') {
                    currentQuestions = shuffleArray(currentQuestions).slice(0, 20);
                    totalQuestions = 20;
                } else if (mode === 'wrong') {
                    const wrongAnswers = JSON.parse(localStorage.getItem('wrongAnswers') || '[]');
                    currentQuestions = wrongAnswers;
                    totalQuestions = wrongAnswers.length;
                }
                
                document.getElementById('totalNum').textContent = totalQuestions;
                displayQuestion();
                
            } catch (error) {
                console.error('Error loading questions:', error);
                alert('문제를 불러오는 중 오류가 발생했습니다.');
            }
        }

        function displayQuestion() {
            if (currentQuestionIndex >= currentQuestions.length) {
                showCompletionScreen();
                return;
            }

            const question = currentQuestions[currentQuestionIndex];
            isAnswered = false;
            selectedAnswer = null;

            // UI 업데이트
            document.getElementById('questionNumber').textContent = `문제 ${currentQuestionIndex + 1}`;
            document.getElementById('questionText').textContent = question.question || '문제 내용이 없습니다.';
            document.getElementById('currentNum').textContent = currentQuestionIndex + 1;
            document.getElementById('questionCounter').textContent = `${currentQuestionIndex + 1} / ${totalQuestions}`;
            
            // 진행률 업데이트
            const progress = Math.round((currentQuestionIndex / totalQuestions) * 100);
            document.querySelector('.circle-bg').style.setProperty('--progress', `${progress}%`);
            document.querySelector('.circle-bg').textContent = `${progress}%`;
            
            // 건너뛰기 표시
            const skipIndicator = document.getElementById('skipIndicator');
            if (skippedQuestions.has(currentQuestionIndex)) {
                skipIndicator.style.display = 'inline';
            } else {
                skipIndicator.style.display = 'none';
            }

            // 선택지 업데이트
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            const options = ['a', 'b', 'c', 'd'];
            const labels = ['A', 'B', 'C', 'D'];
            
            options.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.onclick = () => selectAnswer(div, labels[index], index + 1);
                div.innerHTML = `
                    <div class="option-label">${labels[index]}</div>
                    <div>${question[option] || `선택지 ${labels[index]}`}</div>
                `;
                container.appendChild(div);
            });

            // 피드백 숨기기
            document.getElementById('feedback').style.display = 'none';
            
            // 정답률 업데이트
            const accuracy = answeredQuestions > 0 ? Math.round((correctAnswers / answeredQuestions) * 100) : 0;
            document.getElementById('accuracyRate').textContent = `${accuracy}%`;
        }

        function selectAnswer(element, letter, number) {
            if (isAnswered) return;

            const question = currentQuestions[currentQuestionIndex];
            const correctAnswer = question.answer;
            
            selectedAnswer = number;
            isAnswered = true;
            answeredQuestions++;

            // 모든 옵션 비활성화
            document.querySelectorAll('.option').forEach(opt => {
                opt.style.pointerEvents = 'none';
            });

            // 정답 확인
            const isCorrect = checkAnswer(letter, number, correctAnswer);
            
            if (isCorrect) {
                correctAnswers++;
                element.classList.add('correct');
                showFeedback(true, '🎉 정답입니다!');
            } else {
                element.classList.add('incorrect');
                showFeedback(false, `❌ 틀렸습니다. 정답은 ${correctAnswer}번입니다.`);
                
                // 정답 표시
                const correctIndex = getCorrectOptionIndex(correctAnswer);
                const options = document.querySelectorAll('.option');
                if (options[correctIndex]) {
                    options[correctIndex].classList.add('correct');
                }
            }

            // 건너뛰기 목록에서 제거
            skippedQuestions.delete(currentQuestionIndex);
        }

        function checkAnswer(letter, number, correctAnswer) {
            return number.toString() === correctAnswer.toString() || 
                   letter === correctAnswer.toString() ||
                   (letter === 'A' && correctAnswer.toString() === '1') ||
                   (letter === 'B' && correctAnswer.toString() === '2') ||
                   (letter === 'C' && correctAnswer.toString() === '3') ||
                   (letter === 'D' && correctAnswer.toString() === '4');
        }

        function getCorrectOptionIndex(correctAnswer) {
            const answerMap = { 'A': 0, 'B': 1, 'C': 2, 'D': 3, '1': 0, '2': 1, '3': 2, '4': 3 };
            return answerMap[correctAnswer.toString()] || parseInt(correctAnswer) - 1;
        }

        function showFeedback(isCorrect, message) {
            const feedback = document.getElementById('feedback');
            feedback.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
            feedback.querySelector('.feedback-title').textContent = message;
            feedback.style.display = 'block';
        }

        function skipQuestion() {
            if (isAnswered) return;
            
            skippedQuestions.add(currentQuestionIndex);
            nextQuestion();
        }

        function toggleBookmark() {
            if (bookmarkedQuestions.has(currentQuestionIndex)) {
                bookmarkedQuestions.delete(currentQuestionIndex);
            } else {
                bookmarkedQuestions.add(currentQuestionIndex);
            }
            
            const btn = document.querySelector('.btn-bookmark');
            btn.textContent = bookmarkedQuestions.has(currentQuestionIndex) ? '⭐ 북마크됨' : '⭐ 북마크';
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const minutes = Math.floor(elapsed / 60000);
                const seconds = Math.floor((elapsed % 60000) / 1000);
                document.getElementById('timer').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function setupKeyboardNavigation() {
            document.addEventListener('keydown', (e) => {
                if (isAnswered) return;
                
                if (e.key >= '1' && e.key <= '4') {
                    const options = document.querySelectorAll('.option');
                    const index = parseInt(e.key) - 1;
                    if (options[index]) {
                        options[index].click();
                    }
                } else if (e.key === ' ') { // 스페이스바로 건너뛰기
                    e.preventDefault();
                    skipQuestion();
                }
            });
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function showCompletionScreen() {
            clearInterval(timerInterval);
            
            const elapsed = Date.now() - startTime;
            const minutes = Math.floor(elapsed / 60000);
            const seconds = Math.floor((elapsed % 60000) / 1000);
            const timeString = `${minutes}분 ${seconds}초`;
            
            const accuracy = answeredQuestions > 0 ? Math.round((correctAnswers / answeredQuestions) * 100) : 0;
            const skippedCount = skippedQuestions.size;
            
            document.querySelector('.question-card').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <h2 style="color: #2ecc71; font-size: 2.5rem; margin-bottom: 30px;">🎉 학습 완료!</h2>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0;">
                        <div style="background: #f8f9fa; padding: 20px; border-radius: 15px; border-left: 5px solid #3498db;">
                            <div style="font-size: 2rem; font-weight: bold; color: #3498db;">${answeredQuestions}</div>
                            <div style="color: #7f8c8d;">답변한 문제</div>
                        </div>
                        
                        <div style="background: #f8f9fa; padding: 20px; border-radius: 15px; border-left: 5px solid #2ecc71;">
                            <div style="font-size: 2rem; font-weight: bold; color: #2ecc71;">${accuracy}%</div>
                            <div style="color: #7f8c8d;">정답률</div>
                        </div>
                        
                        <div style="background: #f8f9fa; padding: 20px; border-radius: 15px; border-left: 5px solid #f39c12;">
                            <div style="font-size: 2rem; font-weight: bold; color: #f39c12;">${skippedCount}</div>
                            <div style="color: #7f8c8d;">건너뛴 문제</div>
                        </div>
                        
                        <div style="background: #f8f9fa; padding: 20px; border-radius: 15px; border-left: 5px solid #e74c3c;">
                            <div style="font-size: 2rem; font-weight: bold; color: #e74c3c;">${timeString}</div>
                            <div style="color: #7f8c8d;">소요 시간</div>
                        </div>
                    </div>
                    
                    <div style="margin: 40px 0;">
                        <button onclick="reviewSkipped()" style="margin: 10px; padding: 15px 30px; background: #f39c12; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">
                            건너뛴 문제 복습
                        </button>
                        <button onclick="goToDashboard()" style="margin: 10px; padding: 15px 30px; background: #2ecc71; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">
                            대시보드로
                        </button>
                        <button onclick="restartQuiz()" style="margin: 10px; padding: 15px 30px; background: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">
                            다시 풀기
                        </button>
                    </div>
                </div>
            `;
        }

        function reviewSkipped() {
            if (skippedQuestions.size === 0) {
                alert('건너뛴 문제가 없습니다.');
                return;
            }
            
            const skippedArray = Array.from(skippedQuestions).sort((a, b) => a - b);
            currentQuestionIndex = skippedArray[0];
            displayQuestion();
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            answeredQuestions = 0;
            correctAnswers = 0;
            skippedQuestions.clear();
            bookmarkedQuestions.clear();
            startTime = Date.now();
            startTimer();
            displayQuestion();
        }

        function goToDashboard() {
            if (confirm('문제 풀이를 중단하고 대시보드로 돌아가시겠습니까?')) {
                window.location.href = 'quiz.html';
            }
        }

        function goHome() {
            if (confirm('문제 풀이를 중단하고 처음부터 다시 시작하시겠습니까?')) {
                window.location.href = 'index.html';
            }
        }
        
        function goBack() {
            if (confirm('문제 풀이를 중단하고 이전 단계로 돌아가시겠습니까?')) {
                window.location.href = 'quiz.html';
            }
        }

        // 진행률 저장 (페이지를 벗어날 때)
        window.addEventListener('beforeunload', () => {
            const progress = {
                currentIndex: currentQuestionIndex,
                answeredQuestions,
                correctAnswers,
                skippedQuestions: Array.from(skippedQuestions),
                bookmarkedQuestions: Array.from(bookmarkedQuestions)
            };
            localStorage.setItem('quizProgress', JSON.stringify(progress));
        });
    </script>
</body>
</html>
