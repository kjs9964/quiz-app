<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제 풀이</title>
    <!-- MathJax for LaTeX rendering -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .header {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .exam-info {
            font-weight: bold;
            color: #2c3e50;
            flex: 1;
            min-width: 200px;
        }
        
        .progress-info {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .progress-circle {
            position: relative;
            width: 60px;
            height: 60px;
        }
        
        .circle-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#3498db var(--progress), #ecf0f1 0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2ecc71;
            min-width: 120px;
        }

        .timer.warning {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }
        
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #3498db, #2ecc71);
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .question-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3498db;
        }

        .question-meta {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-left: 15px;
        }
        
        .question-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        
        .btn-bookmark {
            background: #f39c12;
            color: white;
        }
        
        .btn-skip {
            background: #95a5a6;
            color: white;
        }

        .btn-save-exit {
            background: #e74c3c;
            color: white;
        }
        
        .btn-bookmark:hover, .btn-skip:hover, .btn-save-exit:hover {
            transform: scale(1.05);
        }
        
        .question-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .question-image {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .image-notice {
            background: #fff3cd;
            border: 2px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .image-notice::before {
            content: "🖼️";
            font-size: 1.5rem;
        }

        /* 마크다운 표 스타일 */
        .question-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: white;
            border: 2px solid #3498db;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .question-table td {
            padding: 12px 15px;
            border: 1px solid #bdc3c7;
            text-align: center;
            font-size: 1.1rem;
        }

        .question-table tr:first-child {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }

        .question-table tr:nth-child(even) {
            background: #f8f9fa;
        }

        .question-table tr:hover {
            background: #e3f2fd;
        }

        /* MathJax 수식 스타일 */
        .MathJax, .mjx-chtml {
            font-size: 1.15em !important;
            margin: 5px 0;
        }
        
        .options {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .option {
            padding: 20px;
            border: 3px solid #ecf0f1;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
            background: white;
        }
        
        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(52, 152, 219, 0.1), transparent);
            transition: left 0.5s;
        }
        
        .option:not(.correct):not(.incorrect):hover::before {
            left: 100%;
        }
        
        .option:not(.correct):not(.incorrect):hover {
            border-color: #3498db;
            background: #f8f9fa;
            transform: translateX(5px);
        }
        
        .option-label {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 20px;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .option-content {
            flex: 1;
            line-height: 1.6;
        }
        
        .option.selected {
            border-color: #2ecc71;
            background: #d5f4e6;
        }
        
        .option.correct {
            border-color: #27ae60 !important;
            background: #d5f4e6 !important;
            animation: correctPulse 0.6s ease;
        }
        
        .option.incorrect {
            border-color: #e74c3c !important;
            background: #fadbd8 !important;
            animation: incorrectShake 0.6s ease;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        @keyframes incorrectShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .feedback {
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            display: none;
            animation: slideDown 0.5s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .feedback.correct {
            background: #d5f4e6;
            border: 3px solid #27ae60;
            color: #155724;
        }
        
        .feedback.incorrect {
            background: #fadbd8;
            border: 3px solid #e74c3c;
            color: #721c24;
        }
        
        .feedback-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .navigation {
            background: white;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .nav-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-prev {
            background: #95a5a6;
            color: white;
        }
        
        .btn-next {
            background: #3498db;
            color: white;
        }
        
        .btn-prev:hover, .btn-next:hover {
            transform: translateY(-2px);
        }
        
        .btn-prev:disabled,
        .btn-next:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }
        
        .question-counter {
            font-weight: bold;
            color: #2c3e50;
            font-size: 1.1rem;
        }
        
        .skip-indicator {
            background: #f39c12;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .floating-menu {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        
        .floating-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        
        .btn-home {
            background: #e74c3c;
            color: white;
        }
        
        .btn-dashboard {
            background: #2ecc71;
            color: white;
        }
        
        .floating-btn:hover {
            transform: scale(1.1);
        }

        .completion-screen {
            text-align: center;
            padding: 40px;
        }

        .completion-screen h2 {
            color: #2ecc71;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid #3498db;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #3498db;
        }

        .stat-label {
            color: #7f8c8d;
        }

        .completion-actions {
            margin: 40px 0;
        }

        .completion-btn {
            margin: 10px;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .completion-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .modal-content h3 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .modal-content p {
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .modal-btn-primary {
            background: #3498db;
            color: white;
        }

        .modal-btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .quiz-container {
                padding: 10px;
            }

            .question-card {
                padding: 20px;
            }

            .option {
                padding: 15px;
            }

            .floating-menu {
                right: 10px;
            }

            .header {
                flex-direction: column;
            }

            .progress-info {
                width: 100%;
                justify-content: space-between;
            }

            .question-table td {
                padding: 8px 10px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="header">
            <div class="exam-info" id="examInfo">건설안전기사 2003년 1회</div>
            <div class="progress-info">
                <div class="progress-circle">
                    <div class="circle-bg" style="--progress: 0%;">0%</div>
                </div>
                <div>
                    <div class="question-counter" id="questionCounter">1 / 120</div>
                    <div style="color: #7f8c8d; font-size: 0.9rem;">정답률: <span id="accuracyRate">0%</span></div>
                </div>
                <div class="timer" id="timer">00:00</div>
            </div>
        </div>
        
        <div class="question-card" id="questionCard">
            <div class="question-header">
                <div>
                    <span class="question-number" id="questionNumber">문제 1</span>
                    <span class="question-meta" id="questionMeta"></span>
                </div>
                <div class="question-actions">
                    <button class="action-btn btn-bookmark" onclick="toggleBookmark()">⭐ 북마크</button>
                    <button class="action-btn btn-skip" onclick="skipQuestion()">⏭️ 건너뛰기</button>
                    <button class="action-btn btn-save-exit" onclick="saveAndExit()">💾 저장 후 나가기</button>
                </div>
            </div>
            
            <div class="question-text" id="questionText">
                문제를 불러오는 중...
            </div>
            
            <div class="options" id="optionsContainer">
            </div>
            
            <div class="feedback" id="feedback">
                <div class="feedback-title">정답입니다!</div>
            </div>
        </div>
        
        <div class="navigation">
            <button class="nav-btn btn-prev" onclick="previousQuestion()" id="prevBtn">◀ 이전</button>
            <div class="question-counter">
                문제 <span id="currentNum">1</span> / <span id="totalNum">120</span>
                <span class="skip-indicator" id="skipIndicator" style="display: none;">건너뜀</span>
            </div>
            <button class="nav-btn btn-next" onclick="nextQuestion()" id="nextBtn">다음 ▶</button>
        </div>
    </div>
    
    <div class="floating-menu">
        <button class="floating-btn btn-dashboard" onclick="goToDashboard()" title="대시보드">📊</button>
        <button class="floating-btn btn-home" onclick="goHome()" title="홈으로">🏠</button>
    </div>

    <div class="modal-overlay" id="resumeModal">
        <div class="modal-content">
            <h3>💾 저장된 진행 상황 발견</h3>
            <p>이전에 저장된 학습 진행 상황이 있습니다.<br>이어서 계속 진행하시겠습니까?</p>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-primary" onclick="resumeProgress()">계속하기</button>
                <button class="modal-btn modal-btn-secondary" onclick="startFresh()">새로 시작</button>
            </div>
        </div>
    </div>

    <script>
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let selectedAnswer = null;
        let skippedQuestions = new Set();
        let bookmarkedQuestions = new Set();
        let totalQuestions = 0;
        let startTime = Date.now();
        let timerInterval;
        let timeLimit = null;
        let timeWarningShown = false;
        let questionAnswerState = {};

        const config = JSON.parse(localStorage.getItem('quizConfig') || '{}');
        const mode = localStorage.getItem('quizMode') || 'full';

        document.addEventListener('DOMContentLoaded', function() {
            loadBookmarks();
            checkSavedProgress();
        });

        function checkSavedProgress() {
            const savedProgress = localStorage.getItem('quizProgress');
            if (savedProgress) {
                try {
                    const progress = JSON.parse(savedProgress);
                    if (progress.sessionId === config.session && progress.mode === mode) {
                        document.getElementById('resumeModal').classList.add('active');
                        return;
                    }
                } catch (e) {
                    console.error('진행 상황 로드 오류:', e);
                }
            }
            startFresh();
        }

        function resumeProgress() {
            try {
                const savedProgress = JSON.parse(localStorage.getItem('quizProgress'));
                
                currentQuestionIndex = savedProgress.currentIndex || 0;
                questionAnswerState = savedProgress.questionAnswerState || {};
                skippedQuestions = new Set(savedProgress.skippedQuestions || []);
                startTime = savedProgress.startTime || Date.now();
                
                document.getElementById('resumeModal').classList.remove('active');
                
                loadQuestions(true);
            } catch (e) {
                console.error('진행 상황 복구 오류:', e);
                startFresh();
            }
        }

        function startFresh() {
            localStorage.removeItem('quizProgress');
            document.getElementById('resumeModal').classList.remove('active');
            loadQuestions(false);
        }

        function loadBookmarks() {
            const saved = localStorage.getItem('bookmarkedQuestions');
            if (saved) {
                try {
                    bookmarkedQuestions = new Set(JSON.parse(saved));
                } catch (e) {
                    console.error('북마크 로드 오류:', e);
                    bookmarkedQuestions = new Set();
                }
            }
        }

        function saveBookmarks() {
            localStorage.setItem('bookmarkedQuestions', JSON.stringify(Array.from(bookmarkedQuestions)));
        }

        function toggleBookmark() {
            const question = currentQuestions[currentQuestionIndex];
            const questionId = generateQuestionId(question, currentQuestionIndex);
            
            if (bookmarkedQuestions.has(questionId)) {
                bookmarkedQuestions.delete(questionId);
                document.querySelector('.btn-bookmark').textContent = '⭐ 북마크';
                document.querySelector('.btn-bookmark').style.background = '#f39c12';
                
                const bookmarkDetails = JSON.parse(localStorage.getItem('bookmarkDetails') || '{}');
                delete bookmarkDetails[questionId];
                localStorage.setItem('bookmarkDetails', JSON.stringify(bookmarkDetails));
            } else {
                const bookmarkData = {
                    questionId: questionId,
                    examId: config.session || 'unknown',
                    questionIndex: currentQuestionIndex,
                    question: question,
                    addedDate: new Date().toISOString()
                };
                bookmarkedQuestions.add(questionId);
                
                const bookmarkDetails = JSON.parse(localStorage.getItem('bookmarkDetails') || '{}');
                bookmarkDetails[questionId] = bookmarkData;
                localStorage.setItem('bookmarkDetails', JSON.stringify(bookmarkDetails));
                
                document.querySelector('.btn-bookmark').textContent = '⭐ 북마크됨';
                document.querySelector('.btn-bookmark').style.background = '#e67e22';
            }
            saveBookmarks();
        }

        function generateQuestionId(question, index) {
            const session = config.session || 'unknown';
            const subject = question.subject || 'general';
            const qid = question.id || question.Number || index;
            const qtext = (question.question || question.Question || '').substring(0, 30).replace(/[^a-zA-Z0-9가-힣]/g, '');
            return `${session}_${subject}_${qid}_${qtext}`;
        }

        // 마크다운 표를 HTML 테이블로 변환하는 함수
        function convertMarkdownTable(text) {
            const lines = text.split('\\n').map(line => line.trim()).filter(line => line);
            
            if (lines.length < 2) return text;
            
            let html = '<table class="question-table">';
            
            lines.forEach((line, idx) => {
                html += '<tr>';
                const cells = line.split('|').map(cell => cell.trim()).filter(cell => cell);
                cells.forEach(cell => {
                    html += `<td>${cell}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</table>';
            return html;
        }

        async function loadQuestions(isResume = false) {
            try {
                if (mode === 'wrong' || mode === 'bookmark' || mode === 'subject') {
                    const savedQuestions = JSON.parse(localStorage.getItem('quizData') || '[]');
                    
                    if (!Array.isArray(savedQuestions) || savedQuestions.length === 0) {
                        alert('문제가 없습니다. 대시보드로 돌아갑니다.');
                        window.location.href = 'quiz.html';
                        return;
                    }
                    
                    currentQuestions = savedQuestions.map(q => normalizeQuestion(q));
                    totalQuestions = currentQuestions.length;
                    
                } else {
                    const sessionId = config.session;
                    
                    if (!sessionId) {
                        throw new Error('세션 정보가 없습니다.');
                    }
                    
                    console.log('Loading questions from:', sessionId);
                    const response = await fetch(`/api/exams/${sessionId}`);
                    const data = await response.json();
                    
                    if (data.error) {
                        alert(data.error);
                        return;
                    }
                    
                    currentQuestions = data.questions.map(q => normalizeQuestion(q));
                    totalQuestions = currentQuestions.length;
                    
                    if (mode === 'random') {
                        const randomCount = Math.min(20, totalQuestions);
                        if (!isResume) {
                            currentQuestions = shuffleArray(currentQuestions).slice(0, randomCount);
                            localStorage.setItem('randomQuestions', JSON.stringify(currentQuestions));
                        } else {
                            const savedRandom = localStorage.getItem('randomQuestions');
                            if (savedRandom) {
                                try {
                                    currentQuestions = JSON.parse(savedRandom).map(q => normalizeQuestion(q));
                                } catch (e) {
                                    console.error('랜덤 문제 로드 오류:', e);
                                    currentQuestions = shuffleArray(currentQuestions).slice(0, randomCount);
                                }
                            } else {
                                currentQuestions = shuffleArray(currentQuestions).slice(0, randomCount);
                            }
                        }
                        totalQuestions = currentQuestions.length;
                    }
                }
                
                console.log(`${totalQuestions}개 문제 로드 완료`);
                
                if (!isResume) {
                    questionAnswerState = {};
                    currentQuestions.forEach((_, index) => {
                        questionAnswerState[index] = { answered: false, correct: false };
                    });
                }
                
                document.getElementById('totalNum').textContent = totalQuestions;
                document.getElementById('examInfo').textContent = getModeTitle();
                displayQuestion();
                
                startTimer();
                setupKeyboardNavigation();
                
            } catch (error) {
                console.error('문제 로드 오류:', error);
                alert('문제를 불러오는 중 오류가 발생했습니다.\n\n' + error.message);
                window.location.href = 'quiz.html';
            }
        }

        function normalizeQuestion(q) {
            return {
                id: q.id || q.Number || q.number || '',
                question: q.question || q.Question || '',
                questionImage: q.questionImage || q.Question_image || '',
                a: q.a || q['Option 1'] || q.option1 || '',
                b: q.b || q['Option 2'] || q.option2 || '',
                c: q.c || q['Option 3'] || q.option3 || '',
                d: q.d || q['Option 4'] || q.option4 || '',
                answer: String(q.answer || q.Answer || '').trim().toUpperCase(),
                explanation: q.explanation || q.Explanation || '',
                testName: q.testName || q['Test Name'] || '',
                year: q.year || q.Year || '',
                session: q.session || q.Session || '',
                subject: q.subject || q.Subject || ''
            };
        }

        function getModeTitle() {
            const modeNames = {
                'full': '전체 문제',
                'wrong': '오답노트 복습',
                'bookmark': '북마크 복습',
                'random': '랜덤 20문제',
                'timer': '타이머 모드',
                'subject': localStorage.getItem('selectedSubject') || '과목별 학습'
            };
            return modeNames[mode] || '문제 풀이';
        }

        // MathJax 안전 렌더링 함수 (개선됨)
        function renderMathJax(element) {
            if (!element) return;
            
            if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
                MathJax.typesetPromise([element]).catch((err) => {
                    console.log('MathJax 렌더링 오류:', err);
                });
            } else if (typeof MathJax !== 'undefined' && MathJax.Hub) {
                MathJax.Hub.Queue(['Typeset', MathJax.Hub, element]);
            } else {
                setTimeout(() => renderMathJax(element), 100);
            }
        }

        function displayQuestion() {
            if (currentQuestionIndex >= currentQuestions.length) {
                showCompletionScreen();
                return;
            }

            const question = currentQuestions[currentQuestionIndex];

            document.getElementById('questionNumber').textContent = `문제 ${currentQuestionIndex + 1}`;
            
            const metaInfo = [];
            if (question.subject) metaInfo.push(question.subject);
            if (question.year) metaInfo.push(`${question.year}년`);
            if (question.session) metaInfo.push(`${question.session}회`);
            document.getElementById('questionMeta').textContent = metaInfo.length > 0 ? `(${metaInfo.join(' ')})` : '';
            
            const questionTextDiv = document.getElementById('questionText');
            let questionText = question.question || '문제 내용이 없습니다.';
            
            // \n을 <br>로 변환하되, 표 형식이면 테이블로 변환
            if (questionText.includes('\\n') && questionText.includes('|')) {
                questionText = convertMarkdownTable(questionText);
            } else {
                questionText = questionText.replace(/\\n/g, '<br>');
            }
            
            questionTextDiv.innerHTML = questionText;
            
            // 이미지 포함 여부 확인
            const hasImage = question.questionImage && 
                            question.questionImage.trim() !== '' && 
                            question.questionImage.toUpperCase() !== 'X';
            
            if (hasImage) {
                if (question.questionImage.toUpperCase() === 'O') {
                    // 이미지가 있다는 표시만 있는 경우
                    const imageNotice = document.createElement('div');
                    imageNotice.className = 'image-notice';
                    imageNotice.innerHTML = '<strong>이 문제에는 이미지가 포함되어 있습니다.</strong><br>원본 시험지를 참고하세요.';
                    questionTextDiv.appendChild(imageNotice);
                } else {
                    // 실제 이미지 URL이 있는 경우
                    const imgElement = document.createElement('img');
                    imgElement.src = question.questionImage;
                    imgElement.className = 'question-image';
                    imgElement.alt = '문제 이미지';
                    imgElement.onerror = function() {
                        this.style.display = 'none';
                        const imageNotice = document.createElement('div');
                        imageNotice.className = 'image-notice';
                        imageNotice.innerHTML = '<strong>이미지를 불러올 수 없습니다.</strong><br>원본 시험지를 참고하세요.';
                        questionTextDiv.appendChild(imageNotice);
                    };
                    questionTextDiv.appendChild(imgElement);
                }
            }
            
            // MathJax 렌더링
            renderMathJax(questionTextDiv);
            
            document.getElementById('currentNum').textContent = currentQuestionIndex + 1;
            document.getElementById('questionCounter').textContent = `${currentQuestionIndex + 1} / ${totalQuestions}`;
            
            const progress = Math.round((currentQuestionIndex / totalQuestions) * 100);
            document.querySelector('.circle-bg').style.setProperty('--progress', `${progress}%`);
            document.querySelector('.circle-bg').textContent = `${progress}%`;
            
            const skipIndicator = document.getElementById('skipIndicator');
            skipIndicator.style.display = skippedQuestions.has(currentQuestionIndex) ? 'inline' : 'none';

            const questionId = generateQuestionId(question, currentQuestionIndex);
            if (bookmarkedQuestions.has(questionId)) {
                document.querySelector('.btn-bookmark').textContent = '⭐ 북마크됨';
                document.querySelector('.btn-bookmark').style.background = '#e67e22';
            } else {
                document.querySelector('.btn-bookmark').textContent = '⭐ 북마크';
                document.querySelector('.btn-bookmark').style.background = '#f39c12';
            }

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            const options = ['a', 'b', 'c', 'd'];
            const labels = ['A', 'B', 'C', 'D'];
            
            options.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.setAttribute('data-option', labels[index]);
                div.setAttribute('data-number', index + 1);
                
                div.onclick = (function(optLabel, optNumber) {
                    return function() {
                        selectAnswer(this, optLabel, optNumber);
                    };
                })(labels[index], index + 1);
                
                let optionText = question[option] || `선택지 ${labels[index]}`;
                
                div.innerHTML = `
                    <div class="option-label">${labels[index]}</div>
                    <div class="option-content">${optionText}</div>
                `;
                container.appendChild(div);
                
                // 선택지에도 MathJax 렌더링 적용
                const optionContent = div.querySelector('.option-content');
                if (optionContent) {
                    renderMathJax(optionContent);
                }
            });

            document.getElementById('feedback').style.display = 'none';
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            updateAccuracyRate();
        }

        function selectAnswer(element, letter, number) {
            const question = currentQuestions[currentQuestionIndex];
            const correctAnswer = question.answer;
            
            const wasAnswered = questionAnswerState[currentQuestionIndex].answered;
            selectedAnswer = number;

            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(opt => {
                opt.style.pointerEvents = 'none';
                opt.style.cursor = 'default';
            });

            const isCorrect = checkAnswer(letter, number, correctAnswer);
            
            if (!wasAnswered) {
                questionAnswerState[currentQuestionIndex].answered = true;
                questionAnswerState[currentQuestionIndex].correct = isCorrect;
            }
            
            if (isCorrect) {
                element.classList.add('correct');
                showFeedback(true, '🎉 정답입니다!');
            } else {
                element.classList.add('incorrect');
                showFeedback(false, `❌ 틀렸습니다. 정답은 ${correctAnswer}번입니다.`);
                
                const correctIndex = getCorrectOptionIndex(correctAnswer);
                
                if (correctIndex >= 0 && correctIndex < allOptions.length) {
                    allOptions[correctIndex].classList.add('correct');
                }
                
                if (!wasAnswered) {
                    saveWrongAnswer(question);
                }
            }

            skippedQuestions.delete(currentQuestionIndex);
            updateAccuracyRate();
            saveCurrentProgress();
        }

        function updateAccuracyRate() {
            let answeredCount = 0;
            let correctCount = 0;
            
            for (let key in questionAnswerState) {
                if (questionAnswerState[key].answered) {
                    answeredCount++;
                    if (questionAnswerState[key].correct) {
                        correctCount++;
                    }
                }
            }
            
            const accuracy = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
            document.getElementById('accuracyRate').textContent = `${accuracy}%`;
        }

        function checkAnswer(letter, number, correctAnswer) {
            const normalizedCorrect = String(correctAnswer).trim().toUpperCase();
            const normalizedLetter = String(letter).trim().toUpperCase();
            const normalizedNumber = String(number).trim();
            
            if (normalizedNumber === normalizedCorrect) return true;
            if (normalizedLetter === normalizedCorrect) return true;
            
            const letterToNumber = { 'A': '1', 'B': '2', 'C': '3', 'D': '4' };
            const numberToLetter = { '1': 'A', '2': 'B', '3': 'C', '4': 'D' };
            
            if (letterToNumber[normalizedLetter] === normalizedCorrect) return true;
            if (normalizedLetter === numberToLetter[normalizedCorrect]) return true;
            
            return false;
        }

        function getCorrectOptionIndex(correctAnswer) {
            const normalized = String(correctAnswer).trim().toUpperCase();
            
            const letterMap = { 'A': 0, 'B': 1, 'C': 2, 'D': 3 };
            if (letterMap.hasOwnProperty(normalized)) {
                return letterMap[normalized];
            }
            
            const numberMap = { '1': 0, '2': 1, '3': 2, '4': 3 };
            if (numberMap.hasOwnProperty(normalized)) {
                return numberMap[normalized];
            }
            
            const num = parseInt(normalized);
            if (!isNaN(num) && num >= 1 && num <= 4) {
                return num - 1;
            }
            
            return -1;
        }

        function showFeedback(isCorrect, message) {
            const feedback = document.getElementById('feedback');
            feedback.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
            feedback.querySelector('.feedback-title').textContent = message;
            feedback.style.display = 'block';
        }

        function saveWrongAnswer(question) {
            try {
                const wrongAnswers = JSON.parse(localStorage.getItem('wrongAnswers') || '[]');
                const questionId = generateQuestionId(question, currentQuestionIndex);
                const exists = wrongAnswers.some(wrong => wrong.questionId === questionId);
                
                if (!exists) {
                    const wrongQuestion = {
                        ...question,
                        questionId: questionId,
                        examId: config.session || 'unknown',
                        questionIndex: currentQuestionIndex,
                        subject: question.subject || '과목미지정',
                        addedDate: new Date().toISOString()
                    };
                    wrongAnswers.push(wrongQuestion);
                    localStorage.setItem('wrongAnswers', JSON.stringify(wrongAnswers));
                }
            } catch (e) {
                console.error('오답 저장 오류:', e);
            }
        }

        function skipQuestion() {
            skippedQuestions.add(currentQuestionIndex);
            saveCurrentProgress();
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            } else {
                showCompletionScreen();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        }

        function startTimer() {
            if (mode === 'timer') {
                timeLimit = totalQuestions * 90 * 1000;
                document.getElementById('timer').style.color = '#2ecc71';
            }
            
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                
                if (mode === 'timer' && timeLimit) {
                    const remaining = timeLimit - elapsed;
                    
                    if (remaining <= 0) {
                        clearInterval(timerInterval);
                        alert('시간이 초과되었습니다! 시험이 종료됩니다.');
                        showCompletionScreen();
                        return;
                    }
                    
                    const minutes = Math.floor(remaining / 60000);
                    const seconds = Math.floor((remaining % 60000) / 1000);
                    const timerElement = document.getElementById('timer');
                    timerElement.textContent = `⏱ ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    
                    if (remaining <= 300000 && !timeWarningShown) {
                        timeWarningShown = true;
                        timerElement.classList.add('warning');
                        alert('⚠️ 남은 시간이 5분입니다!');
                    }
                    
                    if (remaining <= 60000) {
                        timerElement.classList.add('warning');
                    }
                } else {
                    const minutes = Math.floor(elapsed / 60000);
                    const seconds = Math.floor((elapsed % 60000) / 1000);
                    document.getElementById('timer').textContent = 
                        `🕐 ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function setupKeyboardNavigation() {
            document.addEventListener('keydown', (e) => {
                if (document.querySelector('.modal-overlay.active')) return;
                
                const options = document.querySelectorAll('.option');
                const isAnswered = Array.from(options).some(opt => 
                    opt.classList.contains('correct') || opt.classList.contains('incorrect')
                );
                
                if (isAnswered && (e.key >= '1' && e.key <= '4')) return;
                
                if (e.key >= '1' && e.key <= '4') {
                    e.preventDefault();
                    const index = parseInt(e.key) - 1;
                    if (options[index]) {
                        options[index].click();
                    }
                } else if (e.key === ' ') {
                    e.preventDefault();
                    skipQuestion();
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    previousQuestion();
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    nextQuestion();
                }
            });
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function saveCurrentProgress() {
            try {
                const progress = {
                    sessionId: config.session,
                    mode: mode,
                    currentIndex: currentQuestionIndex,
                    questionAnswerState: questionAnswerState,
                    skippedQuestions: Array.from(skippedQuestions),
                    bookmarkedQuestions: Array.from(bookmarkedQuestions),
                    startTime: startTime,
                    savedAt: Date.now()
                };
                
                if (mode === 'random') {
                    progress.randomQuestions = currentQuestions;
                }
                
                localStorage.setItem('quizProgress', JSON.stringify(progress));
            } catch (e) {
                console.error('진행 상황 저장 오류:', e);
            }
        }

        function saveAndExit() {
            saveCurrentProgress();
            alert('💾 진행 상황이 저장되었습니다!\n\n다음에 다시 접속하면 이어서 풀 수 있습니다.');
            window.location.href = 'quiz.html';
        }

        function saveStudyRecord() {
            try {
                const studyHistory = JSON.parse(localStorage.getItem('studyHistory') || '[]');
                
                let answeredCount = 0;
                let correctCount = 0;
                
                for (let key in questionAnswerState) {
                    if (questionAnswerState[key].answered) {
                        answeredCount++;
                        if (questionAnswerState[key].correct) {
                            correctCount++;
                        }
                    }
                }
                
                const subjectStats = {};
                currentQuestions.forEach((q, idx) => {
                    if (questionAnswerState[idx] && questionAnswerState[idx].answered) {
                        const subject = q.subject || '기타';
                        if (!subjectStats[subject]) {
                            subjectStats[subject] = { answered: 0, correct: 0 };
                        }
                        subjectStats[subject].answered++;
                        if (questionAnswerState[idx].correct) {
                            subjectStats[subject].correct++;
                        }
                    }
                });
                
                const record = {
                    date: new Date().toISOString().split('T')[0],
                    examId: config.session || 'unknown',
                    mode: mode,
                    answered: answeredCount,
                    correct: correctCount,
                    totalQuestions: totalQuestions,
                    accuracy: answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0,
                    timeSpent: Date.now() - startTime,
                    subjects: subjectStats,
                    timestamp: new Date().toISOString()
                };
                
                studyHistory.push(record);
                
                if (studyHistory.length > 100) {
                    studyHistory.splice(0, studyHistory.length - 100);
                }
                
                localStorage.setItem('studyHistory', JSON.stringify(studyHistory));
            } catch (e) {
                console.error('학습 기록 저장 오류:', e);
            }
        }

        function reviewSkipped() {
            if (skippedQuestions.size === 0) {
                alert('건너뛴 문제가 없습니다.');
                return;
            }
            
            const skippedArray = Array.from(skippedQuestions).sort((a, b) => a - b);

                questionCard.innerHTML = `
                    <div class="question-header">
                        <div>

                            <span class="question-meta" id="questionMeta"></span>

                            <button class="action-btn btn-bookmark" onclick="toggleBookmark()">⭐ 북마크</button>

                    <div class="feedback" id="feedback">
                        <div class="feedback-title">정답입니다!</div>

        }

        function reviewWrong() {
            const wrongIndices = [];
            for (let key in questionAnswerState) {
                if (questionAnswerState[key].answered && !questionAnswerState[key].correct) {
                    wrongIndices.push(parseInt(key));
                }
            }
            
            if (wrongIndices.length === 0) {
                alert('틀린 문제가 없습니다!');
                return;
            }
            
            const navElement = document.querySelector('.navigation');
            const questionCard = document.getElementById('questionCard');
            
            if (navElement) {
                navElement.style.display = 'flex';
            }
            
            if (questionCard && document.querySelector('.completion-screen')) {
                questionCard.innerHTML = `
                    <div class="question-header">
                        <div>
                            <span class="question-number" id="questionNumber">문제 1</span>
                            <span class="question-meta" id="questionMeta"></span>
                        </div>
                        <div class="question-actions">
                            <button class="action-btn btn-bookmark" onclick="toggleBookmark()">⭐ 북마크</button>
                            <button class="action-btn btn-skip" onclick="skipQuestion()">⏭️ 건너뛰기</button>
                            <button class="action-btn btn-save-exit" onclick="saveAndExit()">💾 저장 후 나가기</button>
                        </div>
                    </div>
                    
                    <div class="question-text" id="questionText">
                        문제를 불러오는 중...
                    </div>
                    
                    <div class="options" id="optionsContainer">
                    </div>
                    
                    <div class="feedback" id="feedback">
                        <div class="feedback-title">정답입니다!</div>
                    </div>
                `;
            }
            
            currentQuestionIndex = wrongIndices[0];
            displayQuestion();
        }

        function restartQuiz() {
            if (confirm('처음부터 다시 시작하시겠습니까?\n\n' + 
                       (mode === 'random' ? '새로운 랜덤 문제가 선택됩니다.' : '모든 진행 상황이 초기화됩니다.'))) {
                
                currentQuestionIndex = 0;
                skippedQuestions.clear();
                startTime = Date.now();
                timeWarningShown = false;
                questionAnswerState = {};
                
                if (mode === 'random') {
                    localStorage.removeItem('randomQuestions');
                }
                
                localStorage.removeItem('quizProgress');
                
                const navElement = document.querySelector('.navigation');
                const questionCard = document.getElementById('questionCard');
                
                if (navElement) {
                    navElement.style.display = 'flex';
                }
                
                if (questionCard) {
                    questionCard.innerHTML = `
                        <div class="question-header">
                            <div>
                                <span class="question-number" id="questionNumber">문제 1</span>
                                <span class="question-meta" id="questionMeta"></span>
                            </div>
                            <div class="question-actions">
                                <button class="action-btn btn-bookmark" onclick="toggleBookmark()">⭐ 북마크</button>
                                <button class="action-btn btn-skip" onclick="skipQuestion()">⏭️ 건너뛰기</button>
                                <button class="action-btn btn-save-exit" onclick="saveAndExit()">💾 저장 후 나가기</button>
                            </div>
                        </div>
                        
                        <div class="question-text" id="questionText">
                            문제를 불러오는 중...
                        </div>
                        
                        <div class="options" id="optionsContainer">
                        </div>
                        
                        <div class="feedback" id="feedback">
                            <div class="feedback-title">정답입니다!</div>
                        </div>
                    `;
                }
                
                clearInterval(timerInterval);
                loadQuestions(false);
            }
        }

        function goToDashboard() {
            if (currentQuestionIndex < currentQuestions.length && !document.querySelector('.completion-screen')) {
                if (confirm('💾 진행 상황을 저장하고 나가시겠습니까?\n\n"확인"을 누르면 저장 후 이동합니다.\n"취소"를 누르면 저장하지 않고 이동합니다.')) {
                    saveCurrentProgress();
                }
            }
            window.location.href = 'quiz.html';
        }

        function goHome() {
            if (confirm('문제 풀이를 중단하고 처음부터 다시 시작하시겠습니까?\n\n진행 상황은 저장되지 않습니다.')) {
                localStorage.removeItem('quizProgress');
                localStorage.removeItem('randomQuestions');
                window.location.href = 'index.html';
            }
        }

        window.addEventListener('beforeunload', (e) => {
            if (currentQuestionIndex < currentQuestions.length && !document.querySelector('.completion-screen')) {
                saveCurrentProgress();
                e.preventDefault();
                e.returnValue = '진행 상황이 자동 저장됩니다. 페이지를 나가시겠습니까?';
            }
        });
    </script>
</body>
</html>
