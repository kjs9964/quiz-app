<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제 풀이</title>
    <!-- MathJax for LaTeX rendering -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .header {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .exam-info {
            font-weight: bold;
            color: #2c3e50;
        }
        
        .progress-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .progress-circle {
            position: relative;
            width: 60px;
            height: 60px;
        }
        
        .circle-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#3498db var(--progress), #ecf0f1 0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2ecc71;
        }
        
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #3498db, #2ecc71);
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .question-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3498db;
        }
        
        .question-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn-bookmark {
            background: #f39c12;
            color: white;
        }
        
        .btn-skip {
            background: #95a5a6;
            color: white;
        }
        
        .btn-bookmark:hover {
            background: #e67e22;
            transform: scale(1.05);
        }
        
        .btn-skip:hover {
            background: #7f8c8d;
            transform: scale(1.05);
        }
        
        .question-text {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .question-image {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .options {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .option {
            padding: 20px;
            border: 3px solid #ecf0f1;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
        }
        
        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(52, 152, 219, 0.1), transparent);
            transition: left 0.5s;
        }
        
        .option:hover::before {
            left: 100%;
        }
        
        .option:hover {
            border-color: #3498db;
            background: #f8f9fa;
            transform: translateX(5px);
        }
        
        .option-label {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 20px;
            font-size: 1.3rem;
        }
        
        .option.selected {
            border-color: #2ecc71;
            background: #d5f4e6;
        }
        
        .option.correct {
            border-color: #27ae60;
            background: #d5f4e6;
            animation: correctPulse 0.6s ease;
        }
        
        .option.incorrect {
            border-color: #e74c3c;
            background: #fadbd8;
            animation: incorrectShake 0.6s ease;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        @keyframes incorrectShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .feedback {
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            display: none;
            animation: slideDown 0.5s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .feedback.correct {
            background: #d5f4e6;
            border: 3px solid #27ae60;
            color: #155724;
        }
        
        .feedback.incorrect {
            background: #fadbd8;
            border: 3px solid #e74c3c;
            color: #721c24;
        }
        
        .feedback-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .navigation {
            background: white;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-prev {
            background: #95a5a6;
            color: white;
        }
        
        .btn-next {
            background: #3498db;
            color: white;
        }
        
        .btn-prev:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }
        
        .btn-next:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        
        .btn-prev:disabled,
        .btn-next:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }
        
        .question-counter {
            font-weight: bold;
            color: #2c3e50;
            font-size: 1.1rem;
        }
        
        .skip-indicator {
            background: #f39c12;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .floating-menu {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        
        .floating-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        
        .btn-home {
            background: #e74c3c;
            color: white;
        }
        
        .btn-dashboard {
            background: #2ecc71;
            color: white;
        }
        
        .floating-btn:hover {
            transform: scale(1.1);
        }

        .completion-screen {
            text-align: center;
            padding: 40px;
        }

        .completion-screen h2 {
            color: #2ecc71;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid #3498db;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #3498db;
        }

        .stat-label {
            color: #7f8c8d;
        }

        .completion-actions {
            margin: 40px 0;
        }

        .completion-btn {
            margin: 10px;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .completion-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="header">
            <div class="exam-info" id="examInfo">건설안전기사 2003년 1회</div>
            <div class="progress-info">
                <div class="progress-circle">
                    <div class="circle-bg" style="--progress: 0%;">0%</div>
                </div>
                <div>
                    <div class="question-counter" id="questionCounter">1 / 120</div>
                    <div style="color: #7f8c8d; font-size: 0.9rem;">정답률: <span id="accuracyRate">0%</span></div>
                </div>
                <div class="timer" id="timer">00:00</div>
            </div>
        </div>
        
        <div class="question-card" id="questionCard">
            <div class="question-header">
                <div class="question-number" id="questionNumber">문제 1</div>
                <div class="question-actions">
                    <button class="action-btn btn-bookmark" onclick="toggleBookmark()">⭐ 북마크</button>
                    <button class="action-btn btn-skip" onclick="skipQuestion()">⏭️ 건너뛰기</button>
                </div>
            </div>
            
            <div class="question-text" id="questionText">
                문제를 불러오는 중...
            </div>
            
            <div class="options" id="optionsContainer">
            </div>
            
            <div class="feedback" id="feedback">
                <div class="feedback-title">정답입니다!</div>
            </div>
        </div>
        
        <div class="navigation">
            <button class="nav-btn btn-prev" onclick="previousQuestion()" id="prevBtn">◀ 이전</button>
            <div class="question-counter">
                문제 <span id="currentNum">1</span> / <span id="totalNum">120</span>
                <span class="skip-indicator" id="skipIndicator" style="display: none;">건너뜀</span>
            </div>
            <button class="nav-btn btn-next" onclick="nextQuestion()" id="nextBtn">다음 ▶</button>
        </div>
    </div>
    
    <div class="floating-menu">
        <button class="floating-btn btn-dashboard" onclick="goToDashboard()" title="대시보드">📊</button>
        <button class="floating-btn btn-home" onclick="goHome()" title="홈으로">🏠</button>
    </div>

    <script>
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let selectedAnswer = null;
        let skippedQuestions = new Set();
        let bookmarkedQuestions = new Set();
        let totalQuestions = 0;
        let startTime = Date.now();
        let timerInterval;
        let timeLimit = null;
        let timeWarningShown = false;

        // 각 문제별 답변 상태 추적 (중복 카운팅 방지)
        let questionAnswerState = {}; // { questionIndex: { answered: boolean, correct: boolean } }

        const config = JSON.parse(localStorage.getItem('quizConfig') || '{}');
        const mode = localStorage.getItem('quizMode') || 'full';

        document.addEventListener('DOMContentLoaded', function() {
            loadBookmarks();
            loadQuestions();
            startTimer();
            setupKeyboardNavigation();
        });

        function loadBookmarks() {
            const saved = localStorage.getItem('bookmarkedQuestions');
            if (saved) {
                bookmarkedQuestions = new Set(JSON.parse(saved));
            }
        }

        function saveBookmarks() {
            localStorage.setItem('bookmarkedQuestions', JSON.stringify(Array.from(bookmarkedQuestions)));
        }

        function toggleBookmark() {
            const question = currentQuestions[currentQuestionIndex];
            const questionId = `${config.session}_${question.id || currentQuestionIndex}_${question.question.substring(0, 30)}`;
            
            if (bookmarkedQuestions.has(questionId)) {
                bookmarkedQuestions.delete(questionId);
                document.querySelector('.btn-bookmark').textContent = '⭐ 북마크';
                document.querySelector('.btn-bookmark').style.background = '#f39c12';
                
                // bookmarkDetails에서도 제거
                const bookmarkDetails = JSON.parse(localStorage.getItem('bookmarkDetails') || '{}');
                delete bookmarkDetails[questionId];
                localStorage.setItem('bookmarkDetails', JSON.stringify(bookmarkDetails));
            } else {
                const bookmarkData = {
                    questionId: questionId,
                    examId: config.session,
                    questionIndex: currentQuestionIndex,
                    question: question,
                    addedDate: new Date().toISOString()
                };
                bookmarkedQuestions.add(questionId);
                
                const bookmarkDetails = JSON.parse(localStorage.getItem('bookmarkDetails') || '{}');
                bookmarkDetails[questionId] = bookmarkData;
                localStorage.setItem('bookmarkDetails', JSON.stringify(bookmarkDetails));
                
                document.querySelector('.btn-bookmark').textContent = '⭐ 북마크됨';
                document.querySelector('.btn-bookmark').style.background = '#e67e22';
            }
            saveBookmarks();
        }

        async function loadQuestions() {
            try {
                if (mode === 'wrong' || mode === 'bookmark' || mode === 'subject') {
                    const savedQuestions = JSON.parse(localStorage.getItem('quizData') || '[]');
                    currentQuestions = savedQuestions;
                    totalQuestions = currentQuestions.length;
                    
                    if (totalQuestions === 0) {
                        alert('문제가 없습니다.');
                        window.location.href = 'quiz.html';
                        return;
                    }
                } else {
                    const response = await fetch(`/api/exams/${config.session}`);
                    const data = await response.json();
                    
                    if (data.error) {
                        alert(data.error);
                        return;
                    }
                    
                    currentQuestions = data.questions;
                    totalQuestions = currentQuestions.length;
                    
                    if (mode === 'random') {
                        const randomCount = Math.min(20, totalQuestions);
                        currentQuestions = shuffleArray(currentQuestions).slice(0, randomCount);
                        totalQuestions = currentQuestions.length;
                    }
                }
                
                // 문제별 답변 상태 초기화
                currentQuestions.forEach((_, index) => {
                    questionAnswerState[index] = { answered: false, correct: false };
                });
                
                document.getElementById('totalNum').textContent = totalQuestions;
                document.getElementById('examInfo').textContent = getModeTitle();
                displayQuestion();
                
            } catch (error) {
                console.error('Error loading questions:', error);
                alert('문제를 불러오는 중 오류가 발생했습니다.');
            }
        }

        function getModeTitle() {
            const modeNames = {
                'full': '전체 문제',
                'wrong': '오답노트 복습',
                'bookmark': '북마크 복습',
                'random': '랜덤 20문제',
                'timer': '타이머 모드',
                'subject': localStorage.getItem('selectedSubject') || '과목별 학습'
            };
            return modeNames[mode] || '문제 풀이';
        }

        function displayQuestion() {
            if (currentQuestionIndex >= currentQuestions.length) {
                showCompletionScreen();
                return;
            }

            const question = currentQuestions[currentQuestionIndex];

            document.getElementById('questionNumber').textContent = `문제 ${currentQuestionIndex + 1}`;
            
            // 문제 텍스트 표시 (LaTeX 포함)
            const questionTextDiv = document.getElementById('questionText');
            questionTextDiv.innerHTML = question.question || '문제 내용이 없습니다.';
            
            // 문제 이미지 표시
            if (question.questionImage && question.questionImage.trim() !== '') {
                const imgElement = document.createElement('img');
                imgElement.src = question.questionImage;
                imgElement.className = 'question-image';
                imgElement.alt = '문제 이미지';
                imgElement.onerror = function() {
                    this.style.display = 'none';
                    console.warn('이미지 로드 실패:', question.questionImage);
                };
                questionTextDiv.appendChild(imgElement);
            }
            
            // MathJax 렌더링
            if (window.MathJax) {
                MathJax.typesetPromise([questionTextDiv]).catch((err) => console.log('MathJax error:', err));
            }
            
            document.getElementById('currentNum').textContent = currentQuestionIndex + 1;
            document.getElementById('questionCounter').textContent = `${currentQuestionIndex + 1} / ${totalQuestions}`;
            
            const progress = Math.round((currentQuestionIndex / totalQuestions) * 100);
            document.querySelector('.circle-bg').style.setProperty('--progress', `${progress}%`);
            document.querySelector('.circle-bg').textContent = `${progress}%`;
            
            const skipIndicator = document.getElementById('skipIndicator');
            skipIndicator.style.display = skippedQuestions.has(currentQuestionIndex) ? 'inline' : 'none';

            const questionId = `${config.session}_${question.id || currentQuestionIndex}_${question.question.substring(0, 30)}`;
            if (bookmarkedQuestions.has(questionId)) {
                document.querySelector('.btn-bookmark').textContent = '⭐ 북마크됨';
                document.querySelector('.btn-bookmark').style.background = '#e67e22';
            } else {
                document.querySelector('.btn-bookmark').textContent = '⭐ 북마크';
                document.querySelector('.btn-bookmark').style.background = '#f39c12';
            }

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            const options = ['a', 'b', 'c', 'd'];
            const labels = ['A', 'B', 'C', 'D'];
            
            options.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.onclick = () => selectAnswer(div, labels[index], index + 1);
                div.innerHTML = `
                    <div class="option-label">${labels[index]}</div>
                    <div>${question[option] || `선택지 ${labels[index]}`}</div>
                `;
                container.appendChild(div);
            });

            document.getElementById('feedback').style.display = 'none';
            
            // 정답률 업데이트
            updateAccuracyRate();
        }

        function selectAnswer(element, letter, number) {
            const question = currentQuestions[currentQuestionIndex];
            const correctAnswer = question.answer;
            
            // 이미 답변한 문제인지 확인
            const wasAnswered = questionAnswerState[currentQuestionIndex].answered;
            
            selectedAnswer = number;

            document.querySelectorAll('.option').forEach(opt => {
                opt.style.pointerEvents = 'none';
            });

            const isCorrect = checkAnswer(letter, number, correctAnswer);
            
            // 처음 답변하는 경우에만 상태 업데이트
            if (!wasAnswered) {
                questionAnswerState[currentQuestionIndex].answered = true;
                questionAnswerState[currentQuestionIndex].correct = isCorrect;
            }
            
            if (isCorrect) {
                element.classList.add('correct');
                showFeedback(true, '🎉 정답입니다!');
            } else {
                element.classList.add('incorrect');
                showFeedback(false, `❌ 틀렸습니다. 정답은 ${correctAnswer}번입니다.`);
                
                const correctIndex = getCorrectOptionIndex(correctAnswer);
                const options = document.querySelectorAll('.option');
                if (options[correctIndex]) {
                    options[correctIndex].classList.add('correct');
                }
                
                // 처음 틀린 경우에만 오답노트에 저장
                if (!wasAnswered) {
                    saveWrongAnswer(question);
                }
            }

            skippedQuestions.delete(currentQuestionIndex);
            
            updateAccuracyRate();
        }

        function updateAccuracyRate() {
            let answeredCount = 0;
            let correctCount = 0;
            
            for (let key in questionAnswerState) {
                if (questionAnswerState[key].answered) {
                    answeredCount++;
                    if (questionAnswerState[key].correct) {
                        correctCount++;
                    }
                }
            }
            
            const accuracy = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
            document.getElementById('accuracyRate').textContent = `${accuracy}%`;
        }

        function checkAnswer(letter, number, correctAnswer) {
            return number.toString() === correctAnswer.toString() || 
                   letter === correctAnswer.toString() ||
                   (letter === 'A' && correctAnswer.toString() === '1') ||
                   (letter === 'B' && correctAnswer.toString() === '2') ||
                   (letter === 'C' && correctAnswer.toString() === '3') ||
                   (letter === 'D' && correctAnswer.toString() === '4');
        }

        function getCorrectOptionIndex(correctAnswer) {
            const answerMap = { 'A': 0, 'B': 1, 'C': 2, 'D': 3, '1': 0, '2': 1, '3': 2, '4': 3 };
            return answerMap[correctAnswer.toString()] || parseInt(correctAnswer) - 1;
        }

        function showFeedback(isCorrect, message) {
            const feedback = document.getElementById('feedback');
            feedback.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
            feedback.querySelector('.feedback-title').textContent = message;
            feedback.style.display = 'block';
        }

        function saveWrongAnswer(question) {
            const wrongAnswers = JSON.parse(localStorage.getItem('wrongAnswers') || '[]');
            const questionId = `${config.session}_${currentQuestionIndex}_${question.question.substring(0, 50)}`;
            
            const exists = wrongAnswers.some(wrong => wrong.questionId === questionId);
            
            if (!exists) {
                const wrongQuestion = {
                    ...question,
                    questionId: questionId,
                    examId: config.session,
                    questionIndex: currentQuestionIndex,
                    addedDate: new Date().toISOString()
                };
                wrongAnswers.push(wrongQuestion);
                localStorage.setItem('wrongAnswers', JSON.stringify(wrongAnswers));
            }
        }

        function skipQuestion() {
            skippedQuestions.add(currentQuestionIndex);
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            } else {
                // 마지막 문제인 경우 완료 화면으로
                showCompletionScreen();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        }

        function startTimer() {
            if (mode === 'timer') {
                timeLimit = totalQuestions * 90 * 1000;
                document.getElementById('timer').style.color = '#2ecc71';
            }
            
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                
                if (mode === 'timer' && timeLimit) {
                    const remaining = timeLimit - elapsed;
                    
                    if (remaining <= 0) {
                        clearInterval(timerInterval);
                        alert('시간이 초과되었습니다! 시험이 종료됩니다.');
                        showCompletionScreen();
                        return;
                    }
                    
                    const minutes = Math.floor(remaining / 60000);
                    const seconds = Math.floor((remaining % 60000) / 1000);
                    document.getElementById('timer').textContent = 
                        `남은 시간: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    
                    if (remaining <= 300000 && !timeWarningShown) {
                        timeWarningShown = true;
                        document.getElementById('timer').style.color = '#e74c3c';
                        alert('남은 시간이 5분입니다!');
                    }
                    
                    if (remaining <= 60000) {
                        document.getElementById('timer').style.color = '#c0392b';
                        document.getElementById('timer').style.fontWeight = 'bold';
                        document.getElementById('timer').style.animation = 'pulse 1s infinite';
                    }
                } else {
                    const minutes = Math.floor(elapsed / 60000);
                    const seconds = Math.floor((elapsed % 60000) / 1000);
                    document.getElementById('timer').textContent = 
                        `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;}
            }, 1000);
        }

        function setupKeyboardNavigation() {
            document.addEventListener('keydown', (e) => {
                // 답변이 선택되어 있으면 키보드 입력 무시
                const options = document.querySelectorAll('.option');
                const isAnswered = Array.from(options).some(opt => 
                    opt.classList.contains('correct') || opt.classList.contains('incorrect')
                );
                
                if (isAnswered) return;
                
                if (e.key >= '1' && e.key <= '4') {
                    const index = parseInt(e.key) - 1;
                    if (options[index]) {
                        options[index].click();
                    }
                } else if (e.key === ' ') {
                    e.preventDefault();
                    skipQuestion();
                }
            });
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function showCompletionScreen() {
            clearInterval(timerInterval);
            saveStudyRecord();
            
            const elapsed = Date.now() - startTime;
            const minutes = Math.floor(elapsed / 60000);
            const seconds = Math.floor((elapsed % 60000) / 1000);
            const timeString = `${minutes}분 ${seconds}초`;
            
            // 실제 답변한 문제 수와 정답 수 계산
            let answeredCount = 0;
            let correctCount = 0;
            
            for (let key in questionAnswerState) {
                if (questionAnswerState[key].answered) {
                    answeredCount++;
                    if (questionAnswerState[key].correct) {
                        correctCount++;
                    }
                }
            }
            
            const accuracy = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
            const skippedCount = skippedQuestions.size;
            
            const questionCard = document.querySelector('.question-card');
            questionCard.innerHTML = `
                <div class="completion-screen">
                    <h2>🎉 학습 완료!</h2>
                    
                    <div class="stats-grid">
                        <div class="stat-card" style="border-left-color: #3498db;">
                            <div class="stat-value" style="color: #3498db;">${answeredCount}</div>
                            <div class="stat-label">답변한 문제</div>
                        </div>
                        
                        <div class="stat-card" style="border-left-color: #2ecc71;">
                            <div class="stat-value" style="color: #2ecc71;">${correctCount}</div>
                            <div class="stat-label">정답 수</div>
                        </div>
                        
                        <div class="stat-card" style="border-left-color: #9b59b6;">
                            <div class="stat-value" style="color: #9b59b6;">${accuracy}%</div>
                            <div class="stat-label">정답률</div>
                        </div>
                        
                        <div class="stat-card" style="border-left-color: #f39c12;">
                            <div class="stat-value" style="color: #f39c12;">${skippedCount}</div>
                            <div class="stat-label">건너뛴 문제</div>
                        </div>
                        
                        <div class="stat-card" style="border-left-color: #e74c3c;">
                            <div class="stat-value" style="color: #e74c3c;">${timeString}</div>
                            <div class="stat-label">소요 시간</div>
                        </div>
                    </div>
                    
                    <div class="completion-actions">
                        ${skippedCount > 0 ? `
                            <button class="completion-btn" onclick="reviewSkipped()" style="background: #f39c12; color: white;">
                                건너뛴 문제 복습
                            </button>
                        ` : ''}
                        <button class="completion-btn" onclick="goToDashboard()" style="background: #2ecc71; color: white;">
                            대시보드로
                        </button>
                        <button class="completion-btn" onclick="restartQuiz()" style="background: #3498db; color: white;">
                            다시 풀기
                        </button>
                    </div>
                    
                    <div style="margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px; border-left: 4px solid #3498db;">
                        <p style="margin: 0; color: #2c3e50; font-weight: bold;">📊 학습 기록이 저장되었습니다!</p>
                        <p style="margin: 10px 0 0 0; color: #7f8c8d; font-size: 0.9rem;">대시보드에서 자세한 통계를 확인하세요.</p>
                    </div>
                </div>
            `;
            
            // 네비게이션 숨기기
            document.querySelector('.navigation').style.display = 'none';
        }

        function saveStudyRecord() {
            const studyHistory = JSON.parse(localStorage.getItem('studyHistory') || '[]');
            
            // 실제 답변한 문제 수와 정답 수 계산
            let answeredCount = 0;
            let correctCount = 0;
            
            for (let key in questionAnswerState) {
                if (questionAnswerState[key].answered) {
                    answeredCount++;
                    if (questionAnswerState[key].correct) {
                        correctCount++;
                    }
                }
            }
            
            // 과목별 통계 계산
            const subjectStats = {};
            currentQuestions.forEach((q, idx) => {
                if (questionAnswerState[idx] && questionAnswerState[idx].answered) {
                    const subject = q.subject || '기타';
                    if (!subjectStats[subject]) {
                        subjectStats[subject] = { answered: 0, correct: 0 };
                    }
                    subjectStats[subject].answered++;
                    if (questionAnswerState[idx].correct) {
                        subjectStats[subject].correct++;
                    }
                }
            });
            
            const record = {
                date: new Date().toISOString().split('T')[0],
                examId: config.session,
                mode: mode,
                answered: answeredCount,
                correct: correctCount,
                totalQuestions: totalQuestions,
                accuracy: answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0,
                timeSpent: Date.now() - startTime,
                subjects: subjectStats,
                timestamp: new Date().toISOString()
            };
            
            studyHistory.push(record);
            
            // 최근 100개만 유지
            if (studyHistory.length > 100) {
                studyHistory.splice(0, studyHistory.length - 100);
            }
            
            localStorage.setItem('studyHistory', JSON.stringify(studyHistory));
            
            console.log('학습 기록 저장 완료:', record);
        }

        function reviewSkipped() {
            if (skippedQuestions.size === 0) {
                alert('건너뛴 문제가 없습니다.');
                return;
            }
            
            const skippedArray = Array.from(skippedQuestions).sort((a, b) => a - b);
            currentQuestionIndex = skippedArray[0];
            
            // 네비게이션 다시 표시
            document.querySelector('.navigation').style.display = 'flex';
            
            displayQuestion();
        }

        function restartQuiz() {
            if (confirm('처음부터 다시 시작하시겠습니까? 현재 진행 상황은 저장되지 않습니다.')) {
                currentQuestionIndex = 0;
                skippedQuestions.clear();
                startTime = Date.now();
                
                // 답변 상태 초기화
                questionAnswerState = {};
                currentQuestions.forEach((_, index) => {
                    questionAnswerState[index] = { answered: false, correct: false };
                });
                
                // 네비게이션 다시 표시
                document.querySelector('.navigation').style.display = 'flex';
                
                clearInterval(timerInterval);
                startTimer();
                displayQuestion();
            }
        }

        function goToDashboard() {
            if (confirm('문제 풀이를 중단하고 대시보드로 돌아가시겠습니까?')) {
                window.location.href = 'quiz.html';
            }
        }

        function goHome() {
            if (confirm('문제 풀이를 중단하고 처음부터 다시 시작하시겠습니까?')) {
                window.location.href = 'index.html';
            }
        }

        // 페이지 이탈 시 진행 상황 저장
        window.addEventListener('beforeunload', (e) => {
            // 완료 화면이 아닐 때만 경고
            if (currentQuestionIndex < currentQuestions.length) {
                const progress = {
                    currentIndex: currentQuestionIndex,
                    questionAnswerState: questionAnswerState,
                    skippedQuestions: Array.from(skippedQuestions),
                    bookmarkedQuestions: Array.from(bookmarkedQuestions),
                    startTime: startTime
                };
                localStorage.setItem('quizProgress', JSON.stringify(progress));
                
                // 브라우저 경고 표시
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
