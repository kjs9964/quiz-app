<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시험 선택 - 건설안전기사 문제풀이</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .step {
            display: none;
            animation: slideIn 0.5s ease-out;
        }
        
        .step.active {
            display: block;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 40px;
            font-size: 2.5rem;
        }
        
        h2 {
            color: #34495e;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .category-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            border: 3px solid transparent;
        }
        
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .category-card.selected {
            border-color: #f39c12;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        }
        
        .category-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .category-desc {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        .exam-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .exam-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-align: center;
        }
        
        .exam-item:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }
        
        .exam-item.selected {
            border-color: #3498db;
            background: #ebf3ff;
        }
        
        .session-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .session-item {
            background: #2ecc71;
            color: white;
            padding: 15px 25px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            font-weight: bold;
        }
        
        .session-item:hover {
            background: #27ae60;
            transform: scale(1.05);
        }
        
        .session-item.selected {
            background: #e74c3c;
            border-color: #c0392b;
        }
        
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
        }
        
        .nav-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-back {
            background: #95a5a6;
            color: white;
        }
        
        .btn-back:hover {
            background: #7f8c8d;
        }
        
        .btn-next {
            background: #3498db;
            color: white;
        }
        
        .btn-next:hover {
            background: #2980b9;
        }
        
        .btn-next:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        
        .dday-section {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .dday-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .dday-controls input[type="date"] {
            padding: 10px 15px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: white;
            color: #333;
        }
        
        .dday-controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #e74c3c;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        
        .breadcrumb {
            background: #ecf0f1;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .progress-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .progress-step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #bdc3c7;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin: 0 10px;
            position: relative;
        }
        
        .progress-step.active {
            background: #3498db;
        }
        
        .progress-step.completed {
            background: #2ecc71;
        }
        
        .progress-step:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 3px;
            background: #bdc3c7;
        }
        
        .progress-step.completed:not(:last-child)::after {
            background: #2ecc71;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>시험 준비 설정</h1>
        
        <div class="progress-indicator">
            <div class="progress-step active" id="step-1">1</div>
            <div class="progress-step" id="step-2">2</div>
            <div class="progress-step" id="step-3">3</div>
            <div class="progress-step" id="step-4">4</div>
        </div>

        <!-- 1단계: D-Day 설정 -->
        <div class="step active" id="step1">
            <div class="dday-section">
                <h2 style="border: none; color: white; text-align: center;">🎯 목표 시험일 설정</h2>
                <p>목표하는 시험일을 설정하여 D-Day를 확인하세요</p>
                <div class="dday-controls">
                    <input type="date" id="examDateInput">
                    <button onclick="setExamDate()">설정</button>
                </div>
                <div id="ddayDisplay" style="margin-top: 20px; font-size: 1.2rem;"></div>
            </div>
        </div>

        <!-- 2단계: 대분류 선택 -->
        <div class="step" id="step2">
            <div class="breadcrumb">1단계: 안전 분야 선택</div>
            <h2>안전 분야를 선택해주세요</h2>
            <div class="category-grid">
                <div class="category-card" onclick="selectCategory('disaster')">
                    <div class="category-title">재난안전</div>
                    <div class="category-desc">자연재해, 사회재난 관련</div>
                </div>
                <div class="category-card" onclick="selectCategory('fire')">
                    <div class="category-title">소방안전</div>
                    <div class="category-desc">화재예방, 소방시설 관련</div>
                </div>
                <div class="category-card" onclick="selectCategory('industrial')">
                    <div class="category-title">산업안전</div>
                    <div class="category-desc">건설안전, 산업안전 관련</div>
                </div>
            </div>
        </div>

        <!-- 3단계: 자격증 선택 -->
        <div class="step" id="step3">
            <div class="breadcrumb">2단계: 자격증 종류 선택</div>
            <h2 id="step3-title">자격증을 선택해주세요</h2>
            <div class="exam-list" id="examTypeList">
                <!-- 동적으로 생성 -->
            </div>
        </div>

        <!-- 4단계: 회차 선택 -->
        <div class="step" id="step4">
            <div class="breadcrumb">3단계: 시험 회차 선택</div>
            <h2 id="step4-title">회차를 선택해주세요</h2>
            <div class="session-list" id="sessionList">
                <!-- 동적으로 생성 -->
            </div>
        </div>

        <div class="navigation">
            <button class="nav-btn btn-back" onclick="prevStep()" id="prevBtn" style="display: none;">이전</button>
            <button class="nav-btn btn-next" onclick="nextStep()" id="nextBtn">다음</button>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let selectedCategory = null;
        let selectedExamType = null;
        let selectedSession = null;
        let examDate = null;

        const examTypeData = {
            industrial: [
                { id: 'construction-safety', name: '건설안전기사', desc: '건설현장 안전관리' },
                { id: 'industrial-safety', name: '산업안전기사', desc: '산업현장 안전관리' },
                { id: 'safety-management', name: '안전관리사', desc: '종합적 안전관리' }
            ],
            fire: [
                { id: 'fire-safety', name: '소방안전기사', desc: '소방시설 설계·시공' },
                { id: 'fire-facility', name: '소방시설관리사', desc: '소방시설 유지관리' }
            ],
            disaster: [
                { id: 'disaster-prevention', name: '방재안전직 국가7급', desc: '재난관리 공무원' },
                { id: 'emergency-management', name: '응급처치사', desc: '응급상황 대응' }
            ]
        };

        const sessionData = {
            'construction-safety': [
                { id: 'construction-safety-2003-1', name: '2003년 1회' },
                { id: 'construction-safety-2003-2', name: '2003년 2회' },
                { id: 'construction-safety-2003-4', name: '2003년 4회' }
            ]
        };

        function selectCategory(category) {
            selectedCategory = category;
            document.querySelectorAll('.category-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.target.closest('.category-card').classList.add('selected');
            document.getElementById('nextBtn').disabled = false;
        }

        function selectExamType(examType) {
            selectedExamType = examType;
            document.querySelectorAll('.exam-item').forEach(item => {
                item.classList.remove('selected');
            });
            event.target.classList.add('selected');
            document.getElementById('nextBtn').disabled = false;
        }

        function selectSession(session) {
            selectedSession = session;
            document.querySelectorAll('.session-item').forEach(item => {
                item.classList.remove('selected');
            });
            event.target.classList.add('selected');
            document.getElementById('nextBtn').disabled = false;
        }

        function nextStep() {
            if (currentStep === 4) {
                // 학습 시작
                startLearning();
                return;
            }

            // 진행 표시 업데이트
            document.getElementById(`step-${currentStep}`).classList.add('completed');
            document.getElementById(`step-${currentStep}`).classList.remove('active');
            
            document.getElementById(`step${currentStep}`).classList.remove('active');
            currentStep++;
            
            document.getElementById(`step-${currentStep}`).classList.add('active');
            document.getElementById(`step${currentStep}`).classList.add('active');

            // 버튼 상태 업데이트
            document.getElementById('prevBtn').style.display = 'inline-block';
            document.getElementById('nextBtn').disabled = true;

            if (currentStep === 3) {
                loadExamTypes();
            } else if (currentStep === 4) {
                loadSessions();
                document.getElementById('nextBtn').textContent = '학습 시작';
            }
        }

        function prevStep() {
            if (currentStep === 1) return;
            
            document.getElementById(`step-${currentStep}`).classList.remove('active');
            document.getElementById(`step${currentStep}`).classList.remove('active');
            
            currentStep--;
            
            document.getElementById(`step-${currentStep}`).classList.remove('completed');
            document.getElementById(`step-${currentStep}`).classList.add('active');
            document.getElementById(`step${currentStep}`).classList.add('active');

            if (currentStep === 1) {
                document.getElementById('prevBtn').style.display = 'none';
            }

            document.getElementById('nextBtn').textContent = '다음';
            
            // 현재 단계에 따라 nextBtn 활성화 상태 결정
            if (currentStep === 1) {
                document.getElementById('nextBtn').disabled = !examDate;
            } else if (currentStep === 2) {
                document.getElementById('nextBtn').disabled = !selectedCategory;
            } else if (currentStep === 3) {
                document.getElementById('nextBtn').disabled = !selectedExamType;
            }
        }

        function loadExamTypes() {
            const examTypes = examTypeData[selectedCategory];
            const container = document.getElementById('examTypeList');
            const title = document.getElementById('step3-title');
            
            const categoryNames = {
                industrial: '산업안전',
                fire: '소방안전', 
                disaster: '재난안전'
            };
            
            title.textContent = `${categoryNames[selectedCategory]} 자격증을 선택해주세요`;
            
            container.innerHTML = '';
            examTypes.forEach(exam => {
                const div = document.createElement('div');
                div.className = 'exam-item';
                div.onclick = () => selectExamType(exam.id);
                div.innerHTML = `
                    <div style="font-weight: bold; margin-bottom: 5px;">${exam.name}</div>
                    <div style="font-size: 0.9rem; color: #666;">${exam.desc}</div>
                `;
                container.appendChild(div);
            });
        }

        function loadSessions() {
            const sessions = sessionData[selectedExamType] || [];
            const container = document.getElementById('sessionList');
            const title = document.getElementById('step4-title');
            
            const examName = examTypeData[selectedCategory].find(e => e.id === selectedExamType)?.name;
            title.textContent = `${examName} 회차를 선택해주세요`;
            
            container.innerHTML = '';
            sessions.forEach(session => {
                const div = document.createElement('div');
                div.className = 'session-item';
                div.onclick = () => selectSession(session.id);
                div.textContent = session.name;
                container.appendChild(div);
            });
        }

        function setExamDate() {
            const input = document.getElementById('examDateInput');
            if (input.value) {
                examDate = new Date(input.value);
                updateDDayDisplay();
                document.getElementById('nextBtn').disabled = false;
            }
        }

        function updateDDayDisplay() {
            const display = document.getElementById('ddayDisplay');
            if (!examDate) return;
            
            const today = new Date();
            const timeDiff = examDate.getTime() - today.getTime();
            const daysDiff = Math.ceil(timeDiff / (1000 * 3600 * 24));
            
            if (daysDiff > 0) {
                display.innerHTML = `🎯 D-${daysDiff} (${daysDiff}일 남음)`;
            } else if (daysDiff === 0) {
                display.innerHTML = '🔥 D-DAY! 오늘이 시험일입니다!';
            } else {
                display.innerHTML = `✅ D+${Math.abs(daysDiff)} (시험이 지났습니다)`;
            }
        }

        function startLearning() {
            // 여기서 실제 문제 풀이 페이지로 전환
            const config = {
                category: selectedCategory,
                examType: selectedExamType,
                session: selectedSession,
                examDate: examDate
            };
            
            // 설정을 localStorage에 저장
            localStorage.setItem('quizConfig', JSON.stringify(config));
            
            // 페이지 전환 애니메이션
            document.querySelector('.container').style.transform = 'translateX(-100%)';
            document.querySelector('.container').style.opacity = '0';
            
            setTimeout(() => {
                window.location.href = 'quiz.html'; // 실제 문제풀이 페이지로
            }, 500);
        }

        // 초기 설정
        document.getElementById('nextBtn').disabled = true;
    </script>
</body>
</html>
