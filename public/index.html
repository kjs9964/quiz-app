<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시험 학습 시스템</title>
    <script src="exams-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.95;
        }

        .main-nav {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-btn {
            flex: 1;
            min-width: 200px;
            padding: 25px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .nav-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .nav-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .btn-new-quiz {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .btn-dashboard {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .btn-user-guide {
            background: linear-gradient(135deg, #f39c12, #e67e22);
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        .step {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            opacity: 0.5;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .step.active {
            opacity: 1;
            background: rgba(255,255,255,0.35);
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .selection-area {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            min-height: 500px;
            animation: fadeInUp 0.6s ease 0.6s both;
        }

        .section-title {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #3498db;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .category-card, .exam-card, .card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .category-card::before, .exam-card::before, .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .category-card:hover::before, .exam-card:hover::before, .card:hover::before {
            opacity: 1;
        }

        .category-card:hover, .exam-card:hover, .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            border-color: #3498db;
        }

        .category-card.selected, .exam-card.selected {
            border-color: #3498db;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.3);
        }

        .category-icon, .exam-icon, .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .category-name, .exam-name, .card-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .category-stats, .exam-stats, .card-meta {
            color: #7f8c8d;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .data-badge, .card-badge {
            display: inline-block;
            background: #2ecc71;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 8px;
        }

        .no-data-badge, .card-badge.empty {
            background: #95a5a6;
        }

        .session-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .year-group {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border-left: 4px solid #3498db;
        }

        .year-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .session-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .session-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .session-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: #3498db;
        }

        .session-card.selected {
            border-color: #3498db;
            background: #e3f2fd;
            box-shadow: 0 6px 15px rgba(52, 152, 219, 0.2);
        }

        .session-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
        }

        .session-info {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .navigation-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .btn-back {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
        }

        .btn-start {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .breadcrumb {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 18px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            color: #7f8c8d;
            font-size: 1rem;
            border-left: 4px solid #3498db;
        }

        .breadcrumb span {
            color: #3498db;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #7f8c8d;
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 25px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .main-nav {
                flex-direction: column;
            }

            .nav-btn {
                min-width: 100%;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }

            .step-indicator {
                flex-wrap: wrap;
                gap: 10px;
            }

            .step {
                font-size: 0.9rem;
                padding: 10px 15px;
            }

            .navigation-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>안전 시험 학습 시스템</h1>
            <p>재난·산업·소방 안전 자격증 학습 플랫폼</p>
        </div>

        <div class="main-nav" id="mainNav">
            <button class="nav-btn btn-new-quiz" onclick="showExamSelection()">
                <span style="position: relative; z-index: 1;">📚 새로 시작하기</span>
            </button>
            <button class="nav-btn btn-dashboard" onclick="goToDashboard()">
                <span style="position: relative; z-index: 1;">📊 대시보드</span>
            </button>
            <button class="nav-btn btn-user-guide" onclick="window.location.href='user-guide.html'">
                <span style="position: relative; z-index: 1;">📖 사용 가이드</span>
            </button>
        </div>

        <div id="selectionContainer" style="display: none;">
            <div class="step-indicator">
                <div class="step active" id="step1">1. 분야 선택</div>
                <div class="step" id="step2">2. 시험 선택</div>
                <div class="step" id="step3">3. 회차 선택</div>
            </div>

            <div class="selection-area">
                <div id="breadcrumb" class="breadcrumb" style="display: none;"></div>
                
                <div id="categorySelection">
                    <h2 class="section-title">
                        <span>분야를 선택하세요</span>
                    </h2>
                    <div class="card-grid" id="categoryGrid"></div>
                </div>

                <div id="examSelection" style="display: none;">
                    <h2 class="section-title">
                        <span>시험을 선택하세요</span>
                    </h2>
                    <div class="card-grid" id="examGrid"></div>
                </div>

                <div id="sessionSelection" style="display: none;">
                    <h2 class="section-title">
                        <span>회차를 선택하세요</span>
                    </h2>
                    <div id="sessionContainer"></div>
                </div>

                <div class="navigation-buttons">
                    <button class="btn btn-back" id="backBtn" onclick="goBack()" style="display: none;">
                        <span style="position: relative; z-index: 1;">이전 단계</span>
                    </button>
                    <button class="btn btn-start" id="startBtn" onclick="startQuiz()" style="display: none;">
                        <span style="position: relative; z-index: 1;">학습 시작</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ExamStorage = {
            saveSelection: function(category, exam, session) {
                const data = {
                    category: category,
                    exam: exam,
                    session: session,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('lastExamSelection', JSON.stringify(data));
            },
            
            getLastSelection: function() {
                const data = localStorage.getItem('lastExamSelection');
                return data ? JSON.parse(data) : null;
            }
        };

        const ExamUtils = {
            getAllCategories: function() {
                return Object.keys(EXAM_STRUCTURE).map(key => ({
                    key: key,
                    name: EXAM_STRUCTURE[key].displayName,
                    icon: EXAM_STRUCTURE[key].icon
                }));
            },

            getCategoryStats: function(categoryKey) {
                const category = EXAM_STRUCTURE[categoryKey];
                if (!category) return { examCount: 0, totalSessions: 0, totalQuestions: 0 };

                const exams = Object.values(category.exams);
                return {
                    examCount: exams.length,
                    totalSessions: exams.reduce((sum, exam) => sum + exam.sessions.length, 0),
                    totalQuestions: exams.reduce((sum, exam) => 
                        sum + exam.sessions.reduce((s, sess) => s + (sess.questionCount || 0), 0), 0)
                };
            },

            getExamsByCategory: function(categoryKey) {
                const category = EXAM_STRUCTURE[categoryKey];
                if (!category) return [];

                return Object.keys(category.exams).map(examKey => {
                    const exam = category.exams[examKey];
                    return {
                        key: examKey,
                        name: exam.displayName,
                        icon: exam.icon,
                        sessionCount: exam.sessions.length,
                        hasData: exam.sessions.length > 0
                    };
                });
            },

            getSessionsByYear: function(categoryKey, examKey) {
                const exam = EXAM_STRUCTURE[categoryKey]?.exams[examKey];
                if (!exam) return {};

                const sessionsByYear = {};
                exam.sessions.forEach(session => {
                    if (!sessionsByYear[session.year]) {
                        sessionsByYear[session.year] = [];
                    }
                    sessionsByYear[session.year].push(session);
                });

                return sessionsByYear;
            }
        };

        let selectedCategory = null;
        let selectedExam = null;
        let selectedSession = null;
        let currentStep = 1;

        function showExamSelection() {
            document.getElementById('mainNav').style.display = 'none';
            document.getElementById('selectionContainer').style.display = 'block';
            loadCategories();
        }

        function goToDashboard() {
            const config = localStorage.getItem('quizConfig');
            if (!config) {
                alert('먼저 시험을 선택해주세요.');
                showExamSelection();
                return;
            }
            window.location.href = 'quiz.html';
        }

        function loadCategories() {
            const categories = ExamUtils.getAllCategories();
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = '';

            categories.forEach(category => {
                const stats = ExamUtils.getCategoryStats(category.key);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="card-icon">${category.icon}</span>
                    <div class="card-title">${category.name}</div>
                    <div class="card-meta">
                        ${stats.examCount}개 시험<br>
                        ${stats.totalSessions}개 회차<br>
                        총 ${stats.totalQuestions}문제
                    </div>
                `;
                card.onclick = () => selectCategory(category.key, category.name);
                grid.appendChild(card);
            });
        }

        function selectCategory(categoryKey, categoryName) {
            selectedCategory = { key: categoryKey, name: categoryName };
            currentStep = 2;
            updateStepIndicator();
            updateBreadcrumb();
            
            document.getElementById('categorySelection').style.display = 'none';
            document.getElementById('examSelection').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';
            
            loadExams(categoryKey);
        }

        function loadExams(categoryKey) {
            const exams = ExamUtils.getExamsByCategory(categoryKey);
            const grid = document.getElementById('examGrid');
            grid.innerHTML = '';

            if (exams.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <p>등록된 시험이 없습니다.</p>
                    </div>
                `;
                return;
            }

            exams.forEach(exam => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const badgeHtml = exam.hasData 
                    ? '<span class="card-badge">데이터 있음</span>'
                    : '<span class="card-badge empty">준비중</span>';
                
                card.innerHTML = `
                    ${badgeHtml}
                    <span class="card-icon">${exam.icon}</span>
                    <div class="card-title">${exam.name}</div>
                    <div class="card-meta">
                        ${exam.sessionCount > 0 ? `${exam.sessionCount}개 회차` : '회차 준비중'}
                    </div>
                `;
                
                if (exam.hasData) {
                    card.onclick = () => selectExam(exam.key, exam.name);
                } else {
                    card.style.opacity = '0.6';
                    card.style.cursor = 'not-allowed';
                    card.onclick = () => alert('아직 데이터가 준비되지 않았습니다.');
                }
                
                grid.appendChild(card);
            });
        }

        function selectExam(examKey, examName) {
            selectedExam = { key: examKey, name: examName };
            currentStep = 3;
            updateStepIndicator();
            updateBreadcrumb();
            
            document.getElementById('examSelection').style.display = 'none';
            document.getElementById('sessionSelection').style.display = 'block';
            
            loadSessions(selectedCategory.key, examKey);
        }

        function loadSessions(categoryKey, examKey) {
            const sessionsByYear = ExamUtils.getSessionsByYear(categoryKey, examKey);
            const container = document.getElementById('sessionContainer');
            container.innerHTML = '';

            if (Object.keys(sessionsByYear).length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>등록된 회차가 없습니다.</p>
                    </div>
                `;
                return;
            }

            const sortedYears = Object.keys(sessionsByYear).sort((a, b) => b - a);

            sortedYears.forEach(year => {
                const yearGroup = document.createElement('div');
                yearGroup.className = 'year-group';
                
                const yearSessions = sessionsByYear[year].sort((a, b) => a.session - b.session);
                
                yearGroup.innerHTML = `
                    <div class="year-title">📅 ${year}년</div>
                    <div class="session-grid" id="year-${year}"></div>
                `;
                
                container.appendChild(yearGroup);
                
                const grid = document.getElementById(`year-${year}`);
                yearSessions.forEach(session => {
                    const card = document.createElement('div');
                    card.className = 'session-card';
                    card.innerHTML = `
                        <div class="session-number">${session.session}회</div>
                        <div class="session-info">${session.questionCount || 0}문제</div>
                    `;
                    card.onclick = () => selectSession(session);
                    grid.appendChild(card);
                });
            });

            document.getElementById('startBtn').style.display = 'inline-block';
        }

        function selectSession(session) {
            document.querySelectorAll('.session-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.target.closest('.session-card').classList.add('selected');
            
            selectedSession = session;
            updateBreadcrumb();
        }

        function goBack() {
            if (currentStep === 3) {
                currentStep = 2;
                selectedSession = null;
                document.getElementById('sessionSelection').style.display = 'none';
                document.getElementById('examSelection').style.display = 'block';
                document.getElementById('startBtn').style.display = 'none';
            } else if (currentStep === 2) {
                currentStep = 1;
                selectedExam = null;
                document.getElementById('examSelection').style.display = 'none';
                document.getElementById('categorySelection').style.display = 'block';
                document.getElementById('backBtn').style.display = 'none';
            }
            
            updateStepIndicator();
            updateBreadcrumb();
        }

        function startQuiz() {
            if (!selectedSession) {
                alert('회차를 선택해주세요.');
                return;
            }

            const sessionId = selectedSession.fileName.replace('.csv', '');

            const quizConfig = {
                category: selectedCategory.key,
                categoryName: selectedCategory.name,
                exam: selectedExam.key,
                examName: selectedExam.name,
                session: sessionId,
                sessionInfo: selectedSession,
                files: [selectedSession.fileName]
            };

            localStorage.setItem('quizConfig', JSON.stringify(quizConfig));
            localStorage.setItem('quizMode', 'full');
            ExamStorage.saveSelection(selectedCategory.key, selectedExam.key, selectedSession);

            console.log('Quiz Config:', quizConfig);
            window.location.href = 'solve.html';
        }

        function updateStepIndicator() {
            for (let i = 1; i <= 3; i++) {
                const step = document.getElementById(`step${i}`);
                if (i === currentStep) {
                    step.classList.add('active');
                } else {
                    step.classList.remove('active');
                }
            }
        }

        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            let text = '';

            if (selectedCategory) {
                text += `<span>${selectedCategory.name}</span>`;
            }
            if (selectedExam) {
                text += ` > <span>${selectedExam.name}</span>`;
            }
            if (selectedSession) {
                text += ` > <span>${selectedSession.year}년 ${selectedSession.session}회</span>`;
            }

            if (text) {
                breadcrumb.innerHTML = text;
                breadcrumb.style.display = 'block';
            } else {
                breadcrumb.style.display = 'none';
            }
        }
    </script>
</body>
</html>
